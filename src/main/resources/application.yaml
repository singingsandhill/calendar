app:
  base-url: https://datedate.site

# 카카오 OAuth2 로그인 자격증명 (ADR common/security/0004).
# spring.security.oauth2.client.* 프로퍼티 방식은 @WebMvcTest 슬라이스에서
# OAuth2ClientWebSecurityAutoConfiguration 이 HttpSecurity 부재로 컨텍스트 로드를 깨뜨려,
# ClientRegistration 은 KakaoOAuth2ClientConfig 빈으로 직접 등록한다.
kakao:
  oauth2:
    # REST API 키. 미설정 시 더미로 부팅만 가능(로그인 버튼은 동작 안 함).
    client-id: ${KAKAO_CLIENT_ID:kakao-client-id-unset}
    client-secret: ${KAKAO_CLIENT_SECRET:kakao-client-secret-unset}

# SEO 외부 인증 토큰
# - Google: Search Console 발급 토큰. 기본값은 datedate.site 운영 토큰; 다른 도메인 배포 시 GOOGLE_SITE_VERIFICATION 으로 오버라이드.
# - Naver: searchadvisor.naver.com 발급 후 NAVER_SITE_VERIFICATION 으로 주입.
seo:
  google-site-verification: ${GOOGLE_SITE_VERIFICATION:YVK_KclWiLH24rqy7kAI9iNYSA5No9ljXbnSOvsQB4k}
  naver-site-verification: ${NAVER_SITE_VERIFICATION:}

# Google AdSense
# - client: 비어 있으면 adsbygoogle.js 스크립트 자체를 로드하지 않음.
# - slot-*: 비어 있으면 해당 ad-slot fragment 가 렌더되지 않음 (placeholder DOM 미노출).
# 슬롯 ID 는 AdSense 심사 통과 후 콘솔에서 발급. 통과 전엔 환경변수 미설정으로 둔다. # ${ADSENSE_CLIENT:ca-pub-7334667748813914}
adsense:
  client:
  slot-leaderboard: ${ADSENSE_SLOT_LEADERBOARD:}
  slot-infeed: ${ADSENSE_SLOT_INFEED:}
  slot-rectangle: ${ADSENSE_SLOT_RECTANGLE:}

# IndexNow (Bing/Yandex/Naver 호환) 능동 색인 통보
indexnow:
  enabled: ${INDEXNOW_ENABLED:false}
  key: 1dfcb4404e1d4f6fae3423fd163f97b8
  key-location: https://datedate.site/1dfcb4404e1d4f6fae3423fd163f97b8.txt
  host: datedate.site
  endpoint: https://api.indexnow.org/indexnow

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: datedate

  datasource:
    url: ${DB_URL}
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  web:
    resources:
      cache:
        period: 604800
      static-locations: classpath:/static/
      chain:
        strategy:
          content:
            enabled: true
            paths: /**

  jackson:
    default-property-inclusion: always

  # P0-4: 스케줄러 스레드 풀 분리 — 느린 트레이딩 루프가 캔들 동기화/요약 잡을 굶기지 않도록.
  task:
    scheduling:
      pool:
        size: 4

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${STOCK_MAIL_USERNAME:}
    password: ${STOCK_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8081
  forward-headers-strategy: native
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false
    whitelabel:
      enabled: false
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  servlet:
    session:
      cookie:
        # 교차 사이트 form POST 에 세션 쿠키 미전송 (ADR 0004: /api/** CSRF 유예의 전제).
        # 카카오 로그인 복귀는 top-level GET 이라 Lax 에서 정상.
        same-site: lax

runner:
  admin:
    username: ${RUNNER_ADMIN_USERNAME:admin}
    password: ${RUNNER_ADMIN_PASSWORD:admin123}

logging:
  level:
    me.singingsandhill.calendar: DEBUG
    org.hibernate.SQL: DEBUG
  # NOTE: logback-spring.xml 가 파일 회전(KST 기준)과 거래 이벤트 분리(stock-events.log)를 담당.
  # logging.file.name 은 더 이상 사용하지 않는다 (이전: logs/stock-trading.log).

# Trading Bot Configuration
trading:
  bithumb:
    base-url: https://api.bithumb.com
    access-key: ${BITHUMB_ACCESS_KEY:}
    secret-key: ${BITHUMB_SECRET_KEY:}
  bot:
    enabled: ${TRADING_BOT_ENABLED:false}
    # 운영 모드 (P0-1): LIVE / PAPER / BACKTEST. 기본값 LIVE (기존 운영 동작 유지).
    # 파라미터/로직 변경 검증 시 TRADING_BOT_MODE=PAPER 로 실주문 없이 확인 권장.
    mode: ${TRADING_BOT_MODE:LIVE}
    market: KRW-ADA
    max-positions: 2
    order-ratio: 0.25
    signal-cooldown-minutes: 30    # [P2-9] 10→30: 1분봉 과회전·수수료 churn 억제 (감사 권장 ≥60, PAPER 백테스트로 조정)
    min-holding-minutes: 30        # [P2-9] 15→30: 최소 보유 시간 상향
  indicators:
    ma-short: 5
    ma-mid: 20
    ma-long: 60
    rsi-period: 14
    stoch-k: 14
    stoch-d: 3
    stoch-slow: 3
    volume-ma: 20
  thresholds:
    signal-buy: 40        # [FIX] 30→40: 사이클 매매 유지하면서 가짜 신호 필터링
    signal-sell: -40      # [FIX] -30→-40: 매도 신호도 동일 상향
    min-agreeing-indicators: 3  # 최소 3개 지표 합의 필요
    ma-convergence-threshold: 0.002  # MA 수렴 임계값 (0.2% 미만이면 크로스 무시)
    rsi-oversold: 35
    rsi-overbought: 65
    stoch-oversold: 25
    stoch-overbought: 75
    buy-rsi-max: 70
    buy-stoch-k-max: 85
    sell-rsi-min: 30
    sell-stoch-k-min: 15
  risk:
    # [P1-1/P1-2] 출구 R:R 재보정 (ADA 기준 권장값). ⚠️ 기본 LIVE 반영 — PAPER 백테스트 후 확정 권장.
    stop-loss: -0.015     # [P1-1] -3%→-1.5%: TP +3% 와 1:2 R:R (손익분기 승률 83%→33%)
    take-profit: 0.03     # [P1-2] +15%→+3%: 1분봉 알트 인트라데이에서 실현 가능한 익절
    trailing-stop: 0.008  # [P1-2] -3%→-0.8%: 트레일링을 주 승자 출구로 (손익분기 floor 유지)
    trailing-activation: 0.015 # [P1-2] +10%→+1.5%: 의미있는 이익에서 트레일링 활성
    # [P1-9] 수수료율. Bithumb maker=taker=0.25%(limit 로는 못 줄임). 0.04% 쿠폰 보유 시 0.0004 로 설정.
    taker-fee-rate: 0.0025
    # [P1-8] 매도 게이트 순수 net 마진. 왕복 수수료/슬리피지는 PnL 계산에서 이미 차감(이중계상 제거).
    # 쿠폰(taker-fee-rate 0.0004) 적용 시 더 낮춰도 됨.
    min-profit-threshold: 0.001
    # [P0-2/#6] 서킷브레이커 — 연속 손실/일일 손실 한도 도달 시 신규 BUY 차단(청산은 허용).
    circuit-breaker-enabled: true
    max-consecutive-losses: 3
    max-daily-loss-pct: -0.05
  rebalancing:
    enabled: true
    default-ratio: 0.50
    bull-ratio: 0.70
    bear-ratio: 0.30
    deviation-trigger: 0.10
    cooldown-minutes: 480              # [FIX] 4시간→8시간: 리밸런싱 빈도 감소
    min-order-amount: 5000.0           # 최소 주문 금액 (KRW)
    slippage-buffer: 0.005             # 0.5% 슬리피지 버퍼
    skip-when-data-insufficient: true  # MA60 데이터 부족 시 스킵
    min-sell-pnl-pct: 0.0             # [P1-4] -3%→0%: 리밸런싱 매도는 평균 손익 ≥ 0% 일 때만 (ADR-0003 정합, 적자 청산 방지)

# Stock Trading Bot Configuration (Gap & Pullback Strategy)
stock:
  kis:
    base-url: https://openapi.koreainvestment.com:9443
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}
    account-number: ${KIS_ACCOUNT_NUMBER:}
    account-product-code: "01"
    production: true
  mail:
    enabled: ${STOCK_MAIL_ENABLED:false}
    to: ${STOCK_MAIL_TO:}
  bot:
    enabled: ${STOCK_BOT_ENABLED:false}
    max-positions: 5
    max-position-size: 5000000
  screening:
    min-gap-percent: 1.0
    max-gap-percent: 10.0
    min-market-cap: 100000000000
    min-trade-value: 500000000
    min-trade-strength: 100
    max-spread-percent: 0.3
    max-watchlist-size: 10
    floor-gap-percent: 0.5
    floor-trade-strength: 95
  scoring:
    enabled: true
    gap-weight: 30
    strength-weight: 25
    trade-value-weight: 20
    spread-weight: 15
    market-cap-weight: 10
    min-score-threshold: 40
    min-candidates: 3
  entry:
    high-threshold-percent: 1.5
    pullback-min-percent: 1.0
    pullback-max-percent: 5.0
    bounce-threshold-percent: 0.2
    min-pullback-minutes: 3
    max-pullback-minutes: 15
    entry-min-strength: 100
    entry-min-imbalance: 1.0
    soft-entry-validation: true
  exit:
    tp1-percent: 5.0
    tp1-ratio: 0.5
    tp2-ratio: 0.6
    tp3-percent: 10.0
    final-exit-time: "15:20"
  risk:
    stop-loss-percent: 5.0
    trailing-stop-percent: 3.8
    position-size-ratio: 0.1
    time-decay-enabled: true
    min-profit-threshold-late: 0.001
  universe:
    # 항상 포함되는 핀 종목 (사용자 화이트리스트). 빈 배열이면 fallback-codes 만 사용.
