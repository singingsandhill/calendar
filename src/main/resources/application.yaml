    rank-api-top: 30
  trading:
    pre-market-start: "08:30"
    market-open: "09:00"
    # screening-end 는 의미가 모호해 호환용으로만 보존. 트레이딩 루프 가드는 trading-loop-start 사용.
    screening-end: "09:20"
    # 트레이딩 루프 가드 시작 시각. 보통 스크리닝 cron(StockTradingScheduler 의 0 20 9) 와 동일.
