      # === 바이오/제약 ===
      - "207940"
      - "326030"
      - "145020"
      - "091990"
      - "068760"
      - "141080"
      - "196170"
      - "950170"
      - "000120"
      - "017800"
      # === 코스닥 중소형 ===
      - "277810"
      - "067310"
