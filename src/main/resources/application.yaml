    # 갭 + 풀백 전략은 강세 모멘텀 종목에서만 작동하므로 변동성 높은 종목 위주 구성.
    fallback-codes:
      # === 코스피 대형주 ===
      - "005930"
      - "000660"
      - "035420"
      - "035720"
      - "051910"
      - "006400"
      - "068270"
      - "028260"
