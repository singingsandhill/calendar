# ===== About Page Body =====
about.hero.title=DateDate 소개
about.hero.subtitle=가입 없이 사용하는 그룹 일정 조율 도구
about.updated=최종 업데이트: 2026년 5월 10일

about.section.intro.title=DateDate 가 무엇인가요
about.section.intro.body=DateDate 는 여러 명이서 약속 날짜와 장소, 메뉴를 함께 정할 때 단톡방에서 끝없이 반복되는 "언제 돼?" 와 "어디서?" 를 한 번에 정리하는 그룹 일정 조율 도구입니다. 일정 주최자가 페이지 ID(예: college-friends, marketing-team)를 정하면 datedate.site/{ID} 형태의 공유 링크가 만들어지고, 참여자들은 링크를 받아 가능한 날짜를 클릭하기만 하면 자동으로 겹치는 날이 표시됩니다. 회원가입, 앱 설치, 결제 없이 모바일/PC 브라우저에서 바로 사용할 수 있도록 설계됐습니다.

about.section.principles.title=운영 원칙
about.section.principles.body=DateDate 는 사용 마찰을 최소화한 무료 도구를 지향합니다. 핵심 운영 원칙은 다음과 같습니다.
about.section.principles.list1=<strong>회원가입 없음</strong> — 이메일, 전화번호, 이름 같은 개인 식별 정보를 직접 수집하지 않습니다. 페이지 ID 와 참여자 이름은 사용자가 자유롭게 입력합니다.
about.section.principles.list2=<strong>완전 무료</strong> — 일정 생성, 참여, 투표 등 모든 기본 기능에 비용이 없습니다. 운영 비용은 콘텐츠 페이지의 광고로 충당합니다.
about.section.principles.list3=<strong>최소 데이터 보관</strong> — 일정/참여자/투표 데이터는 사용자가 대시보드에서 삭제하기 전까지 유지됩니다. Google Analytics 외에 별도 추적 도구를 두지 않습니다.
about.section.principles.list4=<strong>공개 링크 모델</strong> — 링크를 아는 누구나 참여할 수 있는 구조입니다. 비공개 일정이 필요하면 추측하기 어려운 ID(예: 무작위 문자 + 숫자)로 만드는 것을 권장합니다.

about.section.audience.title=어떤 분께 유용한가요
about.section.audience.body=DateDate 는 8명 이내의 그룹 일정 조율에 최적화돼 있습니다. 다음과 같은 상황에서 자주 쓰입니다.
about.section.audience.case1=<strong>친구 모임</strong> — 동창회, 정기 모임, 갑자기 잡는 번개. 단톡방 메시지 폭주를 막고 한 번에 정리합니다.
about.section.audience.case2=<strong>팀 회의</strong> — 분기 OKR, 스프린트 리뷰, 시간대가 다른 멤버가 섞인 회의 일정 잡기.
about.section.audience.case3=<strong>여행/이벤트 계획</strong> — 가족 여행 출발일, 동호회 1박2일, 결혼식 사전 미팅 등 여러 명의 휴가 일정 맞추기.
about.section.audience.case4=<strong>스터디/동아리</strong> — 격주 스터디, 독서 모임, 자격증 준비처럼 정기 + 보강이 섞인 일정 관리.

about.section.contact.title=연락 및 피드백
about.section.contact.body=서비스 개선 의견, 버그 신고, 기능 요청은 언제든 환영합니다. 아래 폼으로 보내주시면 영업일 기준 3일 이내에 검토하고, 필요한 경우 회신드립니다.
about.section.contact.formLabel=의견 보내기
about.section.contact.note=문의는 한국어 또는 영어로 받을 수 있습니다. 개인정보 처리에 관한 자세한 내용은 개인정보처리방침을, 서비스 이용 조건은 이용약관을 참고하세요.
about.section.contact.privacyLink=개인정보처리방침
about.section.contact.termsLink=이용약관

# ===== Privacy Policy (/privacy) =====
privacy.hero.title=개인정보처리방침
privacy.updated=최종 수정일: 2026년 4월 6일
privacy.section.collect.title=1. 수집하는 정보
privacy.section.collect.intro=DateDate는 서비스 제공을 위해 다음과 같은 정보를 수집합니다:
privacy.section.collect.item1=<strong>사용자 입력 정보:</strong> 페이지 ID(owner ID), 참여자 이름, 선택한 날짜, 제안한 장소 및 메뉴
privacy.section.collect.item2=<strong>자동 수집 정보:</strong> 쿠키, 방문 기록, 브라우저 정보, IP 주소 (Google Analytics를 통해 수집)
privacy.section.collect.outro=DateDate는 회원가입을 요구하지 않으며, 이메일, 전화번호 등의 개인 식별 정보를 직접 수집하지 않습니다.
privacy.section.purpose.title=2. 정보 사용 목적
privacy.section.purpose.intro=수집된 정보는 다음 목적으로 사용됩니다:
privacy.section.purpose.item1=일정 조율 서비스 제공 및 운영
privacy.section.purpose.item2=서비스 이용 통계 분석 및 개선
privacy.section.purpose.item3=인기 장소·메뉴 트렌드 데이터 생성
privacy.section.cookies.title=3. 쿠키 및 추적 기술
privacy.section.cookies.intro=DateDate는 다음과 같은 쿠키 및 추적 기술을 사용합니다:
privacy.section.cookies.item1=<strong>Google Analytics (Google Tag Manager):</strong> 사이트 방문 통계, 사용자 행동 분석을 위해 사용됩니다. 수집된 데이터는 익명화되어 처리됩니다.
privacy.section.cookies.item2=<strong>Google AdSense:</strong> 콘텐츠 페이지에 맞춤형 광고를 표시하기 위해 쿠키를 사용합니다. 사용자의 관심사에 기반한 광고가 게재될 수 있습니다.
privacy.section.cookies.outro=브라우저 설정에서 쿠키를 비활성화할 수 있으나, 일부 서비스 기능이 제한될 수 있습니다.
privacy.section.ads.title=4. 제3자 광고
privacy.section.ads.p1=DateDate는 Google AdSense를 통해 광고를 게재합니다. Google은 사용자의 이전 방문 기록을 기반으로 관련성 높은 광고를 표시할 수 있습니다.
privacy.section.ads.p2=Google의 광고 개인정보보호에 대한 자세한 내용은 <a href="https://policies.google.com/technologies/ads" target="_blank" rel="noopener noreferrer">Google 광고 정책</a>에서 확인할 수 있습니다.
privacy.section.ads.p3=맞춤 광고를 원하지 않는 경우 <a href="https://www.google.com/settings/ads" target="_blank" rel="noopener noreferrer">Google 광고 설정</a>에서 비활성화할 수 있습니다.
privacy.section.retention.title=5. 데이터 보관 및 삭제
privacy.section.retention.item1=일정 데이터는 사용자가 삭제하지 않는 한 계속 보관됩니다.
privacy.section.retention.item2=대시보드에서 일정을 직접 삭제할 수 있습니다.
privacy.section.retention.item3=서비스 운영에 필요한 최소한의 데이터만 보관합니다.
privacy.section.security.title=6. 데이터 보안
privacy.section.security.body=DateDate는 사용자 데이터를 보호하기 위해 HTTPS 암호화 통신을 사용하며, 합리적인 기술적·관리적 보호 조치를 취하고 있습니다.
privacy.section.children.title=7. 아동 개인정보
privacy.section.children.body=DateDate는 만 14세 미만 아동의 개인정보를 의도적으로 수집하지 않습니다. 만 14세 미만 아동의 정보가 수집된 것을 발견한 경우 즉시 삭제 조치합니다.
privacy.section.changes.title=8. 방침 변경
privacy.section.changes.body=본 개인정보처리방침은 법률 또는 서비스 변경에 따라 수정될 수 있습니다. 변경 시 이 페이지에 최종 수정일과 함께 공지합니다.
privacy.section.contact.title=9. 문의
privacy.section.contact.body=개인정보처리방침에 관한 문의는 아래 의견 보내기 양식을 통해 연락해 주세요.
