# Use-case 페이지별 워크드 예시 (detail.html sample 블록 — 슬러그별 차별화)
seo.useCase.friend-meetup.sample.title=이렇게 씁니다 — 동창 모임 예시
seo.useCase.friend-meetup.sample.body=college-friends 페이지에 6명을 추가하고 링크를 단톡방에 공유합니다. 금요일 밤 마감까지 각자 가능한 날을 클릭하면, 토요일에 5명이 겹쳐 가장 진한 색으로 표시됩니다. 같은 화면에서 장소(강남역 vs 홍대)와 메뉴까지 투표해 약속이 한 번에 끝납니다.
seo.useCase.team-meeting.sample.title=이렇게 씁니다 — 정기 회의 예시
seo.useCase.team-meeting.sample.body=team-sprint 페이지를 매월 재사용하며 월/년만 바꿉니다. 팀원 7명이 다음 스프린트 리뷰 가능일을 클릭하면, 수요일이 가장 많이 겹쳐 회의일 후보로 떠오릅니다. 지난 달 팀원 명단이 그대로 남아 있어 매번 새로 입력할 필요가 없습니다.
seo.useCase.travel-planning.sample.title=이렇게 씁니다 — 여행 일정 예시
seo.useCase.travel-planning.sample.body=japan-trip 페이지에 친구 4명이 각자 휴가 가능 구간을 통째로 클릭합니다. 5월 둘째 주 목~일이 네 명 모두 겹쳐, 3박 4일 일정의 출발일이 자동으로 좁혀집니다. 숙소·동선 후보는 메뉴 투표로 함께 정합니다.
seo.useCase.study-group.sample.title=이렇게 씁니다 — 스터디 예시
seo.useCase.study-group.sample.body=coding-study 페이지에서 매주 정기 회차와 시험 전 보강 후보를 함께 둡니다. 스터디원 5명 중 4명이 가능한 토요일 오전이 정규 회차로, 보강은 다수가 가능할 때만 추가합니다. 진도와 발표자는 일정 설명란에 적어 둡니다.
seo.useCase.club-activity.sample.title=이렇게 씁니다 — 동호회 예시
seo.useCase.club-activity.sample.body=tennis-club 페이지에 정회원 8명을 등록하고 매주 목요일 밤을 참석 마감으로 둡니다. 이번 주 6명이 토요일 오전에 모이면 복식 코트 두 면을 예약하고, 노쇼 없이 코트비를 정산합니다. 다음 달은 월만 바꿔 그대로 이어갑니다.
# 홈 에디토리얼 섹션 (왜/어떻게/한계) — index.html why-section
index.why.title=단톡방 대신 DateDate를 쓰는 이유
index.why.lead=그룹 일정 조율이 매번 어려운 건 도구가 없어서가 아니라, 단톡방이 일정 조율에 맞지 않는 도구이기 때문입니다.
index.why.problem.title="언제 돼?"의 무한 반복
index.why.problem.bubble1=토요일 오후만 돼요
index.why.problem.bubble2=난 일요일만!
index.why.problem.bubble3=다음 주에 알려줘도 돼?
index.why.problem.summary=답은 흩어지고, 교집합은 주최자가 손으로 셉니다. 한 명이 일정을 바꾸면 처음부터 다시.
index.why.how.title=DateDate가 동작하는 방식
index.why.how.step1.title=페이지 만들기
index.why.how.step1.desc=ID 하나만 정하면 끝. 가입도 설치도 없습니다.
index.why.how.step2.title=링크 공유
index.why.how.step2.desc=참여자는 이름을 고르고 달력에서 되는 날을 클릭합니다.
index.why.how.step3.title=겹치는 날 확인
index.why.how.step3.desc=색이 진할수록 많이 되는 날. 장소·메뉴 투표까지 한 페이지에서 끝냅니다.
index.why.limits.title=솔직한 한계
index.why.limits.item1=날짜 단위로 조율합니다. 오전/오후 시간대 구분은 없습니다.
index.why.limits.item2=한 페이지 8명까지 권장합니다. 소규모 모임에 최적화되어 있습니다.
index.why.limits.item3=링크를 아는 사람은 누구나 참여할 수 있습니다. 비공개가 필요하면 추측 어려운 ID를 쓰세요.
index.why.limits.note=일정 알림과 위치 안내는 구글·애플 캘린더가 더 강합니다. DateDate로 날짜를 정하고, 결과는 캘린더로 옮기세요.

