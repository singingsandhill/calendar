faq.a5=\uB124, \uC2A4\uB9C8\uD2B8\uD3F0, \uD0DC\uBE14\uB9BF, PC \uBAA8\uB4E0 \uAE30\uAE30\uC5D0\uC11C \uC0AC\uC6A9\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4. \uBCC4\uB3C4 \uC571 \uC124\uCE58 \uC5C6\uC774 \uBE0C\uB77C\uC6B0\uC800\uC5D0\uC11C \uBC14\uB85C \uC774\uC6A9 \uAC00\uB2A5\uD569\uB2C8\uB2E4.
