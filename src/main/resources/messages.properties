# ===== Guide: Troubleshooting =====
guide.troubleshooting.title=\uC790\uC8FC \uACAA\uB294 \uBB38\uC81C \uD574\uACB0
guide.troubleshooting.q1=\uB9C1\uD06C\uB97C \uACF5\uC720\uD588\uB294\uB370 \uCC38\uC5EC\uC790\uAC00 \uD22C\uD45C\uB97C \uBABB \uD574\uC694
guide.troubleshooting.a1=\uB300\uC2DC\uBCF4\uB4DC \uB9C1\uD06C(datedate.site/\uB0B4ID)\uAC00 \uC544\uB2C8\uB77C \uC6D4\uBCC4 \uC77C\uC815 \uB9C1\uD06C(datedate.site/\uB0B4ID/2026/7)\uB97C \uACF5\uC720\uD588\uB294\uC9C0 \uD655\uC778\uD558\uC138\uC694. \uC77C\uC815 \uCE74\uB4DC\uC758 '\uB9C1\uD06C \uBCF5\uC0AC' \uBC84\uD2BC\uC744 \uB204\uB974\uBA74 \uC815\uD655\uD55C \uB9C1\uD06C\uAC00 \uBCF5\uC0AC\uB429\uB2C8\uB2E4. \uCC38\uC5EC\uC790\uB294 \uC774\uB984\uC744 \uC785\uB825\uD558\uACE0 \uAC00\uB2A5\uD55C \uB0A0\uC9DC\uB97C \uD074\uB9AD\uD55C \uB4A4 \uC800\uC7A5\uD574\uC57C \uBC18\uC601\uB429\uB2C8\uB2E4.
guide.troubleshooting.q2=\uC6D0\uD558\uB294 \uD398\uC774\uC9C0 ID\uAC00 \uC774\uBBF8 \uC0AC\uC6A9 \uC911\uC774\uC5D0\uC694
guide.troubleshooting.a2=\uD398\uC774\uC9C0 ID\uB294 \uBA3C\uC800 \uB9CC\uB4E0 \uC0AC\uB78C\uC774 \uC0AC\uC6A9\uD558\uB294 \uC120\uCC29\uC21C \uBC29\uC2DD\uC785\uB2C8\uB2E4. \uC601\uBB38 \uC18C\uBB38\uC790\u00B7\uC22B\uC790\u00B7\uD558\uC774\uD508(-)\uC73C\uB85C 2~20\uC790\uAE4C\uC9C0 \uB9CC\uB4E4 \uC218 \uC788\uC73C\uB2C8, \uB4A4\uC5D0 \uC5F0\uB3C4\uB098 \uBAA8\uC784 \uC774\uB984\uC744 \uBD99\uC5EC(my-team-2026) \uBCC0\uD615\uD574 \uBCF4\uC138\uC694. \uC11C\uBE44\uC2A4 \uACBD\uB85C\uC640 \uACB9\uCE58\uB294 \uC77C\uBD80 \uC608\uC57D\uC5B4\uB294 \uC0AC\uC6A9\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.
guide.troubleshooting.q3=8\uBA85\uBCF4\uB2E4 \uB9CE\uC740 \uC778\uC6D0\uC740 \uC5B4\uB5BB\uAC8C \uD558\uB098\uC694?
guide.troubleshooting.a3=\uC77C\uC815 \uD558\uB098\uC5D0\uB294 \uCD5C\uB300 8\uBA85\uAE4C\uC9C0 \uCC38\uC5EC\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4. \uC778\uC6D0\uC774 \uB354 \uB9CE\uB2E4\uBA74 \uC870\uBCC4\uB85C \uD398\uC774\uC9C0\uB97C \uB098\uB204\uAC70\uB098(team-a, team-b), \uAC19\uC740 ID \uC544\uB798 \uC5EC\uB7EC \uB2EC \uC77C\uC815\uC73C\uB85C \uB098\uB220\uC11C \uC870\uC728\uD558\uB294 \uBC29\uBC95\uC744 \uCD94\uCC9C\uD569\uB2C8\uB2E4.
guide.troubleshooting.q4=\uC77C\uC815\uC744 \uC218\uC815\uD558\uAC70\uB098 \uC0AD\uC81C\uD558\uACE0 \uC2F6\uC5B4\uC694
guide.troubleshooting.a4=\uB300\uC2DC\uBCF4\uB4DC\uC758 \uC77C\uC815 \uCE74\uB4DC\uC5D0\uC11C '\uBCF4\uAE30'\uB85C \uC77C\uC815\uC744 \uC5F4\uACE0, \uC774\uB984 \uB4DC\uB86D\uB2E4\uC6B4\uC5D0\uC11C \uC790\uC2E0\uC744 \uC120\uD0DD\uD558\uBA74 \uB0A0\uC9DC\uB97C \uB2E4\uC2DC \uACE0\uB97C \uC218 \uC788\uC2B5\uB2C8\uB2E4. \uC77C\uC815 \uC790\uCCB4\uB97C \uC5C6\uC560\uB824\uBA74 \uCE74\uB4DC\uC758 '\uC0AD\uC81C' \uBC84\uD2BC\uC744 \uB204\uB974\uC138\uC694. \uC0AD\uC81C\uB294 \uC989\uC2DC \uC801\uC6A9\uB418\uBA70 \uB418\uB3CC\uB9B4 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.
guide.troubleshooting.q5=\uB0B4 \uB370\uC774\uD130\uB294 \uC5B8\uC81C\uAE4C\uC9C0 \uBCF4\uAD00\uB418\uB098\uC694?
guide.troubleshooting.a5=\uC77C\uC815 \uB370\uC774\uD130\uB294 \uC9C1\uC811 \uC0AD\uC81C\uD558\uAE30 \uC804\uAE4C\uC9C0 \uBCF4\uAD00\uB429\uB2C8\uB2E4. \uB354 \uC774\uC0C1 \uD544\uC694 \uC5C6\uB294 \uC77C\uC815\uC740 \uB300\uC2DC\uBCF4\uB4DC\uC5D0\uC11C \uC5B8\uC81C\uB4E0 \uC0AD\uC81C\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4. \uC790\uC138\uD55C \uB0B4\uC6A9\uC740 \uAC1C\uC778\uC815\uBCF4\uCC98\uB9AC\uBC29\uCE68\uC744 \uCC38\uACE0\uD558\uC138\uC694.
guide.troubleshooting.q6=\uB9C1\uD06C\uB97C \uC5F4\uC5C8\uB354\uB2C8 \uB2E4\uB978 \uB2EC\uC774 \uBCF4\uC5EC\uC694
guide.troubleshooting.a6=DateDate\uC758 \uC77C\uC815\uC740 \uC6D4 \uB2E8\uC704\uB85C \uB9CC\uB4E4\uC5B4\uC9D1\uB2C8\uB2E4. \uACF5\uC720\uBC1B\uC740 \uB9C1\uD06C\uC758 \uC5F0\uB3C4/\uC6D4(datedate.site/\uB0B4ID/2026/7)\uC774 \uC57D\uC18D\uC744 \uC7A1\uB294 \uB2EC\uACFC \uB9DE\uB294\uC9C0 \uD655\uC778\uD558\uC138\uC694. \uB300\uC2DC\uBCF4\uB4DC\uC5D0\uC11C '\uC774\uBC88 \uB2EC' \uBC84\uD2BC\uC744 \uB204\uB974\uBA74 \uD604\uC7AC \uB2EC \uC77C\uC815\uC73C\uB85C \uBC14\uB85C \uC774\uB3D9\uD569\uB2C8\uB2E4.

