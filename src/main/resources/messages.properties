faq.q3=\uB9C1\uD06C\uB97C \uBC1B\uC740 \uCC38\uC5EC\uC790\uB294 \uC5B4\uB5BB\uAC8C \uD558\uB098\uC694?
faq.a3=\uB9C1\uD06C\uB97C \uC5F4\uBA74 \uBC14\uB85C \uC77C\uC815 \uD398\uC774\uC9C0\uB85C \uC5F0\uACB0\uB429\uB2C8\uB2E4. \uC774\uB984\uC744 \uC120\uD0DD\uD558\uAC70\uB098 \uCD94\uAC00\uD55C \uB4A4, \uCE98\uB9B0\uB354\uC5D0\uC11C \uAC00\uB2A5\uD55C \uB0A0\uC9DC\uB97C \uD074\uB9AD\uD558\uACE0 \uC800\uC7A5\uD558\uBA74 \uB429\uB2C8\uB2E4. \uAC00\uC785\uC774\uB098 \uC571 \uC124\uCE58\uB294 \uD544\uC694 \uC5C6\uC2B5\uB2C8\uB2E4.
faq.q4=\uB0A0\uC9DC\uB97C \uC798\uBABB \uC120\uD0DD\uD558\uBA74 \uC5B4\uB5BB\uAC8C \uC218\uC815\uD558\uB098\uC694?
faq.a4=\uB4DC\uB86D\uB2A4\uC6B4\uC5D0\uC11C \uC790\uC2E0\uC758 \uC774\uB984\uC744 \uC120\uD0DD\uD558\uBA74 \uC774\uC804\uC5D0 \uC120\uD0DD\uD55C \uB0A0\uC9DC\uAC00 \uD45C\uC2DC\uB429\uB2C8\uB2E4. \uB0A0\uC9DC\uB97C \uB2E4\uC2DC \uD074\uB9AD\uD558\uBA74 \uC120\uD0DD/\uD574\uC81C\uAC00 \uB429\uB2C8\uB2E4. \uC800\uC7A5 \uBC84\uD2BC\uC744 \uB204\uB974\uAE30 \uC804\uAE4C\uC9C0\uB294 \uC5B8\uC81C\uB4E0 \uC218\uC815\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.
