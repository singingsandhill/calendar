# ===== SEO Guide =====
seo.guide.title=사용 가이드 - 여러명 약속 잡기 방법 | DateDate
seo.guide.description=DateDate로 여러명이 약속을 잡는 방법을 5단계로 안내합니다. 무료 일정 조율 사이트로 모임 날짜, 장소, 메뉴를 한번에 정하세요.
seo.guide.keywords=여러명 약속 잡기 방법, 무료 일정 조율 사이트, 모임 날짜 맞추기, 그룹 스케줄링 사용법, 약속 잡기 도구
seo.guide.ogTitle=사용 가이드 - 여러명 약속 잡기 방법 | DateDate
seo.guide.ogDescription=5단계로 쉽게! 링크 하나로 날짜·장소·메뉴까지 한번에 정하는 방법을 알아보세요.
seo.guide.howTo.name=DateDate로 여러명 약속 잡기
seo.guide.howTo.description=DateDate를 사용하여 그룹 일정을 조율하는 방법을 5단계로 안내합니다.
seo.guide.howTo.tool=웹 브라우저
seo.guide.step1.name=페이지 만들기
seo.guide.step1.text=datedate.site에 접속하여 원하는 ID를 입력하고 시작하기를 클릭합니다. 영문, 숫자, 하이픈으로 2~20자의 고유 ID를 만드세요.
seo.guide.step2.name=일정 생성
seo.guide.step2.text=대시보드에서 월을 선택하면 해당 월의 일정 페이지가 자동으로 생성됩니다.
seo.guide.step3.name=링크 공유
seo.guide.step3.text=생성된 일정 페이지 링크를 카카오톡, 슬랙, 이메일 등으로 참여자에게 공유합니다.
seo.guide.step4.name=날짜 선택 & 투표
seo.guide.step4.text=참여자들이 이름을 입력하고 가능한 날짜를 클릭하여 선택합니다. 장소와 메뉴도 제안하고 투표할 수 있습니다.
seo.guide.step5.name=결과 확인 & 결정
seo.guide.step5.text=가장 많은 사람이 가능한 날짜, 가장 인기있는 장소와 메뉴를 확인하고 최종 약속을 결정합니다.

# ===== SEO Use Cases =====
seo.useCase.howTo.nameFormat={0} 방법 - DateDate

seo.useCase.friend-meetup.title=친구 모임 약속 잡기
seo.useCase.friend-meetup.description=친구들과 모임 날짜를 쉽게 정하세요. 동창 모임, 정기 모임, 생일 파티 등 여러명의 일정을 한번에 조율할 수 있습니다.
seo.useCase.friend-meetup.body="언제 돼?" 카톡방에서 끝없이 반복되는 질문, 이제 그만하세요. DateDate 링크 하나면 친구들의 가능한 날짜가 한눈에 보입니다. 동창 모임, 정기 모임, 생일 파티, 동호회 번개 등 어떤 모임이든 링크를 공유하면 각자 되는 날짜를 선택하고, 가장 많은 친구가 가능한 날이 자동으로 표시됩니다. 장소와 메뉴까지 투표로 정할 수 있어 "어디서 만날까?", "뭐 먹을까?"까지 한번에 해결됩니다. 가입도 앱 설치도 필요 없으니 부담 없이 시작하세요.
seo.useCase.friend-meetup.exampleLabel=동창 모임
seo.useCase.friend-meetup.exampleId=college-friends
seo.useCase.friend-meetup.step1.name=DateDate 페이지 만들기
seo.useCase.friend-meetup.step1.text=datedate.site에 접속해 그룹 ID(예: college-friends)를 입력하고 시작하기를 클릭합니다.
seo.useCase.friend-meetup.step2.name=친구들에게 링크 공유하기
seo.useCase.friend-meetup.step2.text=생성된 페이지 링크를 카카오톡, 문자 등으로 친구들에게 공유합니다. 앱 설치나 가입 없이 바로 참여할 수 있습니다.
seo.useCase.friend-meetup.step3.name=모두가 가능한 날짜 확인하기
seo.useCase.friend-meetup.step3.text=친구들이 각자 이름을 입력하고 가능한 날짜를 클릭하면, 가장 많이 겹치는 날짜가 자동으로 하이라이트됩니다.

seo.useCase.team-meeting.title=팀 회의 일정 조율
seo.useCase.team-meeting.description=바쁜 팀원들의 회의 시간을 효율적으로 잡으세요. 킥오프, 정기 회의, 리뷰 미팅 일정을 가입 없이 조율합니다.
seo.useCase.team-meeting.body=프로젝트 킥오프, 스프린트 리뷰, 정기 회의... 바쁜 팀원들의 일정을 맞추는 건 쉽지 않습니다. DateDate는 별도 가입이나 로그인 없이 링크만 공유하면 팀원들이 바로 가능한 날짜를 선택할 수 있습니다. 최대 8명까지 참여 가능하며, 각 참여자마다 고유 색상이 부여되어 누가 언제 가능한지 캘린더에서 직관적으로 확인됩니다. 슬랙, 이메일, 카카오톡 등 어떤 채널로든 링크를 공유할 수 있어 팀 커뮤니케이션 도구에 구애받지 않습니다.
seo.useCase.team-meeting.exampleLabel=마케팅팀 주간 회의
seo.useCase.team-meeting.exampleId=marketing-team
seo.useCase.team-meeting.step1.name=팀 일정 페이지 만들기
seo.useCase.team-meeting.step1.text=datedate.site에 접속해 팀 ID(예: dev-team)를 입력하고 시작하기를 클릭합니다.
seo.useCase.team-meeting.step2.name=팀원에게 링크 공유하기
seo.useCase.team-meeting.step2.text=생성된 링크를 슬랙, 이메일 등 업무 채널로 공유합니다. 팀원은 별도 가입 없이 참여 가능합니다.
seo.useCase.team-meeting.step3.name=최적 미팅 날짜 결정하기
seo.useCase.team-meeting.step3.text=팀원들이 가능한 날짜를 선택하면 공통 가능 날짜가 자동으로 강조됩니다. 장소와 회의실도 투표로 정할 수 있습니다.

seo.useCase.travel-planning.title=여행 날짜 맞추기
seo.useCase.travel-planning.description=가족 여행, 친구 여행 날짜를 쉽게 맞추세요. 각자의 휴가 일정을 한곳에 모아 겹치는 날을 찾을 수 있습니다.
seo.useCase.travel-planning.body=여행은 가고 싶은데 날짜가 안 맞는다? DateDate로 여행 멤버들의 가능한 날짜를 한번에 모으세요. 각자 휴가 일정이나 가능한 날짜를 캘린더에서 클릭하면, 가장 많은 사람이 겹치는 날짜가 바로 보입니다. 가족 여행, 해외여행, 국내 여행, 워크숍 등 어떤 여행이든 활용 가능합니다. 여행지 투표 기능으로 "어디로 갈까?"도 함께 정할 수 있고, 맛집이나 관광지 링크를 메뉴에 첨부하면 여행 계획까지 한 페이지에서 관리할 수 있습니다.
seo.useCase.travel-planning.exampleLabel=일본 여행 계획
seo.useCase.travel-planning.exampleId=japan-trip-2025
seo.useCase.travel-planning.step1.name=여행 일정 페이지 만들기
seo.useCase.travel-planning.step1.text=datedate.site에 접속해 여행 ID(예: trip-2025)를 입력하고 시작하기를 클릭합니다.
seo.useCase.travel-planning.step2.name=여행 멤버에게 링크 공유하기
seo.useCase.travel-planning.step2.text=생성된 링크를 여행 멤버들에게 공유합니다. 가입 없이 누구나 바로 일정에 참여할 수 있습니다.
seo.useCase.travel-planning.step3.name=모두가 가능한 여행 날짜 잡기
seo.useCase.travel-planning.step3.text=멤버들이 각자 가능한 날짜를 선택하면 최적 여행 날짜가 강조됩니다. 여행지와 맛집도 함께 투표해 결정할 수 있습니다.

seo.useCase.study-group.title=스터디 그룹 일정
seo.useCase.study-group.description=스터디, 독서 모임, 동아리 정기 모임 날짜를 쉽게 잡으세요. 각자 되는 날을 한곳에 모아 정기 일정을 결정합니다.
seo.useCase.study-group.body=스터디 그룹의 정기 모임 날짜를 정하는 것, 생각보다 어렵죠? DateDate를 사용하면 스터디원들이 각자 가능한 날짜를 선택하고, 가장 많은 사람이 모일 수 있는 날을 쉽게 찾을 수 있습니다. 코딩 스터디, 독서 모임, 어학 스터디, 자격증 스터디, 대학 동아리 등 어떤 그룹이든 활용 가능합니다. 모임 장소도 투표로 정할 수 있어 카페, 스터디룸, 도서관 중 어디서 만날지도 한번에 결정하세요. 매월 새로운 일정을 만들어 정기적으로 활용할 수 있습니다.
seo.useCase.study-group.exampleLabel=코딩 스터디
seo.useCase.study-group.exampleId=coding-study
seo.useCase.study-group.step1.name=스터디 일정 페이지 만들기
seo.useCase.study-group.step1.text=datedate.site에 접속해 스터디 ID(예: java-study)를 입력하고 시작하기를 클릭합니다.
seo.useCase.study-group.step2.name=스터디원에게 링크 공유하기
seo.useCase.study-group.step2.text=생성된 링크를 스터디원들에게 공유합니다. 앱 설치나 로그인 없이 바로 일정에 참여할 수 있습니다.
seo.useCase.study-group.step3.name=정기 모임 날짜 조율하기
seo.useCase.study-group.step3.text=스터디원들이 가능한 날짜를 선택하면 공통 가능 날짜가 자동 표시됩니다. 장소와 공부할 메뉴도 함께 정할 수 있습니다.
seo.useCase.club-activity.title=동호회 정기모임 일정 잡기
seo.useCase.club-activity.description=동호회·취미모임 정기 활동 날짜와 참석 인원을 한 번에. 테니스·등산·풋살·보드게임처럼 매주·매월 모이는 모임의 회차별 참석을 미리 확인하세요.
seo.useCase.club-activity.body=동호회는 한 번의 약속이 아니라 회원이 들고 나는 상시 모임입니다. 회원 명단은 15명이어도 이번 주에 실제로 나오는 사람은 매번 6~10명, 그마저도 바뀝니다. DateDate 링크 하나면 회원들이 각자 가능한 날짜를 클릭하고, 회차별 참석 인원이 자동으로 집계됩니다. 테니스·풋살·배드민턴 같은 운동 모임은 코트 예약 인원을, 등산·캠핑 같은 번개는 가능한 주말을 미리 가늠할 수 있습니다. 장소·코트·뒤풀이 투표까지 같은 화면에서 끝내고, 매월 페이지를 재사용해 정기 활동을 이어가세요. 가입도 앱 설치도 필요 없습니다.
seo.useCase.club-activity.exampleLabel=테니스 동호회
seo.useCase.club-activity.exampleId=tennis-club
seo.useCase.club-activity.step1.name=동호회 일정 페이지 만들기
seo.useCase.club-activity.step1.text=datedate.site에 접속해 동호회 ID(예: tennis-club)를 입력하고 시작하기를 클릭합니다.
seo.useCase.club-activity.step2.name=회원에게 링크 공유하기
seo.useCase.club-activity.step2.text=생성된 링크를 동호회 단톡방·밴드·카페에 공유합니다. 앱 설치나 가입 없이 회원 누구나 바로 참석 여부를 표시할 수 있습니다.
seo.useCase.club-activity.step3.name=이번 회차 참석 인원 확인하기
seo.useCase.club-activity.step3.text=회원들이 가능한 날짜를 클릭하면 회차별 참석 인원이 자동 집계됩니다. 코트·구장·장소 예약 규모를 미리 정할 수 있습니다.
