# ===== Use Case: friend-meetup (5-section content) =====
seo.useCase.friend-meetup.section.intro=친구와 약속 잡는 게 왜 이렇게 어려울까요. 단톡방에 "언제 돼?"를 던지면 답이 오기까지 며칠이 걸리고, 누가 답했는지 매번 스크롤해서 세야 합니다. 친구 모임용 DateDate 페이지는 단톡방 대신 한 화면에서 각자의 가능 날짜를 모아주고, 가장 많이 겹치는 날을 자동으로 보여줍니다. 같은 페이지에서 만날 장소와 메뉴까지 투표로 정할 수 있어, 약속 잡기에 드는 시간을 며칠에서 30분 이내로 줄여줍니다.

seo.useCase.friend-meetup.section.whenToUse.title=친구 모임에서 DateDate를 쓰는 순간
seo.useCase.friend-meetup.section.whenToUse.lead=친구 사이의 약속은 인원이 적은 대신 일정이 흩어집니다. 다음과 같은 상황에서 페이지 하나가 단톡방을 대체합니다.
seo.useCase.friend-meetup.section.whenToUse.scenario1.title=동창회·졸업 N년 모임
seo.useCase.friend-meetup.section.whenToUse.scenario1.text=1년에 한두 번 모이는 동창회는 평일/주말 누구는 직장인, 누구는 대학원생이라 일정이 정말 안 맞습니다. 모임 4주 전에 페이지를 열고 가능한 날을 모두 클릭해 받으면, 절반 이상이 가능한 날짜가 자동으로 두꺼운 색으로 표시됩니다.
seo.useCase.friend-meetup.section.whenToUse.scenario2.title=정기 모임 (월 1회·계절별)
seo.useCase.friend-meetup.section.whenToUse.scenario2.text=매달 모이는 친구 모임도 정작 그 달의 어느 주말에 모일지는 매번 새로 정해야 합니다. 같은 페이지를 매월 재사용하면서 월/년만 변경하면 됩니다(예: datedate.site/college-friends/2026/02). 지난 달 멤버 이름이 그대로 남아 있어 입력 부담이 없습니다.
seo.useCase.friend-meetup.section.whenToUse.scenario3.title=갑자기 잡는 번개 모임
seo.useCase.friend-meetup.section.whenToUse.scenario3.text=오늘이 수요일인데 이번 주말 또는 다음 주에 한 번 보고 싶을 때. 페이지를 만들고 친구 4-5명에게 링크만 보내면 30분 내에 답이 모입니다. 가능 날짜뿐 아니라 메뉴 후보(예: 김치찌개·파스타·치킨)도 함께 던져 동시에 정합니다.

seo.useCase.friend-meetup.section.mistakes.title=친구 약속 잡기, 흔한 실수
seo.useCase.friend-meetup.section.mistakes.lead=DateDate를 쓰기 전에는 다음과 같은 패턴이 반복됐을 겁니다. 도구 자체보다 이 패턴을 끊는 것이 핵심입니다.
seo.useCase.friend-meetup.section.mistakes.mistake1.problem=단톡방에서 "언제 돼?"를 무한 반복: 답이 안 오는 친구를 매번 호명하다 결국 누군가 포기합니다.
seo.useCase.friend-meetup.section.mistakes.mistake1.fix=DateDate 링크 + 응답 마감 시한을 명시하세요(예: "금요일 자정까지 클릭해줘"). 미응답자는 마감 후 한 번만 리마인드, 그 이후엔 그 사람을 빼고 진행합니다.
seo.useCase.friend-meetup.section.mistakes.mistake2.problem=주최자 일정만 기준으로 잡기: "나는 토요일 다 가능" 후 결국 두세 명만 참석하는 패턴.
seo.useCase.friend-meetup.section.mistakes.mistake2.fix=주최자도 다른 참여자와 동등하게 가능한 날만 클릭하세요. 5명 중 3명 이상 가능한 날을 우선으로 보고, 본인이 못 가는 날도 그 안에 들어가면 살짝 양보합니다.
seo.useCase.friend-meetup.section.mistakes.mistake3.problem=약속 일주일 전에 "시간 바꿔도 돼?" 톡: 페이지에서 정해놓고는 마감 직전에 한 명이 일정 변경 요청.
seo.useCase.friend-meetup.section.mistakes.mistake3.fix=약속 7일 전에 "확정" 메시지를 한 번 더 보내고, 그 시점 이후 변경은 전체 일정 다시 잡기임을 명시하세요. 한 명을 위해 4명을 흔들면 다음 약속이 없어집니다.

seo.useCase.friend-meetup.section.tips.title=친구 모임을 빠르게 잡는 팁
seo.useCase.friend-meetup.section.tips.tip1.title=응답 마감 시한 명시
seo.useCase.friend-meetup.section.tips.tip1.text=링크와 함께 "24시간 안에 답해줘" 또는 "이번 주말까지" 처럼 명시적 마감을 적습니다. 마감이 없으면 답은 무한히 미뤄지고, 결국 주최자가 지칩니다.
seo.useCase.friend-meetup.section.tips.tip2.title=장소·메뉴 투표 동시 진행
seo.useCase.friend-meetup.section.tips.tip2.text=DateDate의 장소·메뉴 투표 기능은 날짜와 함께 한 화면에서 끝낼 수 있도록 설계됐습니다. 단톡방을 두 번 도배할 필요 없이 한 페이지에서 모두 정합니다. When2meet이나 Doodle처럼 날짜만 다루는 도구와 다른 점입니다.
seo.useCase.friend-meetup.section.tips.tip3.title=기본 멤버 명단 미리 입력
seo.useCase.friend-meetup.section.tips.tip3.text=주최자가 페이지를 만들 때 5-8명의 이름을 미리 한 줄씩 추가하면, 친구들이 링크를 열었을 때 "내 이름 클릭 → 가능 날짜 클릭" 두 번이면 끝납니다. 이름 입력 부담이 없어 응답률이 올라갑니다.
seo.useCase.friend-meetup.section.tips.tip4.title=캘린더 앱과 병행
seo.useCase.friend-meetup.section.tips.tip4.text=DateDate가 가능 날짜를 모으면, 그 결과를 본인의 구글/애플 캘린더에 옮기세요. 일정 알림과 위치 정보는 캘린더 앱이 더 강합니다. DateDate는 조율 단계, 캘린더는 통보 단계로 역할을 나눕니다.

seo.useCase.friend-meetup.section.faq.q1=친구가 8명 넘으면 어떻게 하나요?
seo.useCase.friend-meetup.section.faq.a1=DateDate는 한 페이지당 최대 8명을 권장합니다. 9명 이상이면 기능적으로는 작동하지만 캘린더 색상 구분이 어려워집니다. 9-12명짜리 모임은 코어 멤버 5-6명으로 먼저 날짜를 정하고, 나머지에게는 결과만 통보하는 구조가 효율적입니다.
seo.useCase.friend-meetup.section.faq.q2=참여자가 가능 날짜를 잘못 클릭했어요. 수정 가능한가요?
seo.useCase.friend-meetup.section.faq.a2=네. 본인 이름을 다시 선택한 뒤 캘린더에서 추가/제거할 날짜를 클릭하고 저장 버튼을 누르면 됩니다. 다른 참여자에게는 별도 알림이 가지 않으므로 자유롭게 수정해도 괜찮습니다.
seo.useCase.friend-meetup.section.faq.q3=링크가 외부에 새면 어떻게 되나요?
seo.useCase.friend-meetup.section.faq.a3=DateDate 페이지는 링크를 아는 누구나 들어와 이름을 입력하고 일정을 추가할 수 있습니다. 친구 모임처럼 비공개를 원하면 ID에 무작위 문자열을 섞으세요(예: friends-x7q9). 추측 어려운 ID가 사실상 비공개 보호 역할을 합니다.
seo.useCase.friend-meetup.section.faq.q4=응답 안 한 친구 한 명 때문에 결정이 안 됩니다.
seo.useCase.friend-meetup.section.faq.a4=DateDate 대시보드에서 누가 미응답인지 한눈에 보입니다. 마감 1일 전에 카톡으로 직접 한 번 더 호출하고, 마감 후엔 그 친구를 빼고 다수결로 결정하세요. 4-5명 중 3명 이상이 가능한 날이면 그게 그 모임의 답입니다.
seo.useCase.friend-meetup.section.faq.q5=이전 모임 멤버를 다음 달에 그대로 쓸 수 있나요?
seo.useCase.friend-meetup.section.faq.a5=같은 페이지 ID의 다음 달 일정(예: datedate.site/college-friends/2026/02)으로 이동하면 멤버가 자동 복제됩니다. 새 달이 시작될 때 비어 있던 멤버 명단이 채워져 있어 입력을 다시 할 필요가 없습니다.

# ===== Use Case: team-meeting (5-section content) =====
seo.useCase.team-meeting.section.intro=팀 회의 일정 잡기는 친구 모임보다 단순해 보이지만, 시간대·우선순위·회의실 자원이 얽히면 더 까다롭습니다. 매니저 한 명의 캘린더 뜸을 기준으로 잡으면 절반의 멤버가 다른 일정과 겹치고, 슬랙에서 폴링하면 답이 흩어집니다. 팀 회의용 DateDate 페이지는 4-8명의 가능 시간을 한 화면에 모으고, 회의 장소(현장/원격)와 진행 시간(30분/60분)까지 같은 페이지에서 정합니다. 매주/격주 회의는 같은 페이지를 재사용하면 됩니다.

seo.useCase.team-meeting.section.whenToUse.title=팀 회의 일정 조율이 필요한 순간
seo.useCase.team-meeting.section.whenToUse.lead=회의는 가능 시간이 적은 만큼 몇 안 되는 후보를 정확히 좁히는 작업입니다. 다음 상황에서 단순 캘린더 폴링보다 DateDate 페이지가 효율적입니다.
seo.useCase.team-meeting.section.whenToUse.scenario1.title=분기 OKR / 킥오프 회의
seo.useCase.team-meeting.section.whenToUse.scenario1.text=분기 시작 전 OKR 정렬 회의처럼 4-8명이 1.5-2시간 통째로 비워야 하는 회의는 캘린더 자동 추천이 잘 안 맞습니다. 페이지를 만들어 모두에게 가능 시간 5개씩 클릭하라고 하면, 겹치는 시간 슬롯이 자동 표시됩니다. 결정에 24시간이면 충분합니다.
seo.useCase.team-meeting.section.whenToUse.scenario2.title=스프린트 리뷰 / 회고
seo.useCase.team-meeting.section.whenToUse.scenario2.text=스프린트 마지막 날의 리뷰+회고는 1시간씩 두 번이지만, 한 명이 출장 또는 휴가일 때 다음 주로 이동시키기 어렵습니다. 매주 같은 페이지를 재사용하면 멤버 명단 입력이 사라지고, 어느 날짜가 가능한지만 클릭하면 됩니다.
seo.useCase.team-meeting.section.whenToUse.scenario3.title=시간대가 다른 분산 팀
seo.useCase.team-meeting.section.whenToUse.scenario3.text=한국·미국·유럽이 섞인 팀은 회의 시간을 잡을 때 한 시간이 아닌 세 시간대를 동시에 봐야 합니다. 페이지에 가능 시간을 KST 기준으로 클릭받고, 결과를 미국/유럽 멤버가 자기 시간대로 환산해 검증합니다.

seo.useCase.team-meeting.section.mistakes.title=팀 회의 일정 잡기, 흔한 실수
seo.useCase.team-meeting.section.mistakes.lead=회의 일정 갈등의 대부분은 도구가 아니라 어떤 일정을 우선시할지의 정책 문제입니다.
seo.useCase.team-meeting.section.mistakes.mistake1.problem=매니저 캘린더만 기준으로: "리더 가능한 시간이 우선이니 멤버는 맞춰주세요" 패턴. 결과적으로 사일런트 빠지는 멤버가 늘어납니다.
seo.useCase.team-meeting.section.mistakes.mistake1.fix=리더도 동등하게 가능 시간을 클릭하세요. 4명 중 3명 + 리더가 되는 시간이 결과여야 합니다. 리더가 못 가는 슬롯이 다수에 들어가면 회의 목적(의사결정·정보 공유·회고)에 따라 일정을 미루거나 대리 진행자를 정해 진행할지 판단하세요.
seo.useCase.team-meeting.section.mistakes.mistake2.problem=시간대 환산을 한 명이 도맡기: 미국 멤버가 매번 "제 시간으로 몇 시예요?" 묻는 패턴. 환산 실수로 한 명이 빠지면 회의가 깨집니다.
seo.useCase.team-meeting.section.mistakes.mistake2.fix=페이지에 가능 시간을 적을 때 KST + UTC 두 시간대를 함께 명시하세요(예: "화 14:00 KST = 05:00 UTC"). 각 멤버는 자기 시간대로 변환해 클릭합니다. 환산은 worldtimebuddy.com 등으로 미리 확인.
seo.useCase.team-meeting.section.mistakes.mistake3.problem=회의실/Zoom 링크 예약을 마감 후로 미루기: 시간이 정해진 뒤 회의실이 없어 다른 시간으로 또 옮기는 패턴.
seo.useCase.team-meeting.section.mistakes.mistake3.fix=후보 시간대 3개를 좁힌 시점에 회의실 또는 Zoom 링크를 임시 예약해두세요. 최종 시간 결정 후 다른 후보의 예약을 취소하면 됩니다. 예약은 가능하지만 결정은 못 한 상태가 가장 안전합니다.

seo.useCase.team-meeting.section.tips.title=팀 회의를 빠르게 잡는 팁
seo.useCase.team-meeting.section.tips.tip1.title=회의 길이 명시
seo.useCase.team-meeting.section.tips.tip1.text=30분/60분/90분 중 하나를 페이지 설명에 명시합니다. 길이를 모르면 멤버가 가능 시간을 보수적으로 잡아 후보가 줄어듭니다. 30분 회의라면 2시간 통짜 시간이 아니라 30분짜리 슬롯도 후보입니다.
seo.useCase.team-meeting.section.tips.tip2.title=장소·형식 투표 활용
seo.useCase.team-meeting.section.tips.tip2.text=현장/원격/하이브리드 중 어떤 형식인지도 페이지의 장소 투표로 처리하세요. "강남 사무실", "Zoom", "종로 공유 오피스" 같은 후보를 나열하고 투표 받으면 형식이 결정됩니다. Calendly나 구글 캘린더는 시간만 다루지만 DateDate는 장소까지 한 페이지에서 결정합니다.
seo.useCase.team-meeting.section.tips.tip3.title=사전 안건 공유
seo.useCase.team-meeting.section.tips.tip3.text=페이지 description 또는 첨부 노션 링크로 안건을 미리 알리세요. 안건 없는 회의는 가능 시간이 좁아져도 가치를 만들기 어렵습니다. 30분 회의라면 안건 4개를 5분씩 처리하는 식으로 미리 시간 분배까지 적습니다.
seo.useCase.team-meeting.section.tips.tip4.title=정기 회의는 같은 페이지 반복 사용
seo.useCase.team-meeting.section.tips.tip4.text=스프린트 리뷰처럼 매주 또는 격주 정기 회의는 datedate.site/marketing-team처럼 한 페이지에 멤버를 고정하고, 매월/매주 새 일정만 추가합니다. 멤버 명단 재입력이 사라져 회의 한 번당 5분 이상 절약됩니다.

seo.useCase.team-meeting.section.faq.q1=회의 시간을 슬롯 단위(예: 14:00, 14:30)로 잡을 수 있나요?
seo.useCase.team-meeting.section.faq.a1=DateDate는 날짜 단위 일정 조율에 최적화돼 있어 시간 슬롯 별 투표는 직접 지원하지 않습니다. 시간대까지 투표가 필요하면 페이지 설명에 후보 시간 3개를 적고, 멤버가 가능한 시간을 메뉴 투표로 선택하는 우회 방법이 있습니다(메뉴 = 시간 후보).
seo.useCase.team-meeting.section.faq.q2=참여자가 익명으로 일정을 클릭할 수 있나요?
seo.useCase.team-meeting.section.faq.a2=익명 클릭은 불가능합니다. 모든 참여자는 페이지에 이름을 추가하거나 기존 이름을 선택한 뒤 일정을 클릭합니다. 이름 색상이 자동 배정되므로 캘린더에서 "누가 가능한 날" 이 한눈에 보입니다.
seo.useCase.team-meeting.section.faq.q3=팀이 8명을 넘어 11명입니다. 어떻게 하나요?
seo.useCase.team-meeting.section.faq.a3=11명짜리 회의 자체가 비효율이 큽니다. 결정권자 5-6명으로 핵심 회의를 잡고, 나머지는 결과를 통보받는 구조로 분리하세요. 11명 모두의 일정을 동시에 맞추려 하면 실제로는 결정 못 하는 회의가 됩니다.
seo.useCase.team-meeting.section.faq.q4=회의 일정이 정해진 뒤 한 명이 휴가를 새로 잡았어요.
seo.useCase.team-meeting.section.faq.a4=정해진 회의를 한 명을 위해 옮기는 것은 그 한 명의 비용 < 다른 멤버들이 다시 일정 비우는 비용인지 매번 따져봐야 합니다. 보통은 그 멤버를 빼고 진행하거나, 끝난 후 1:1로 동기화하는 쪽이 효율적입니다.
seo.useCase.team-meeting.section.faq.q5=회의 결과를 캘린더에 자동으로 보낼 수 있나요?
seo.useCase.team-meeting.section.faq.a5=현재 DateDate는 캘린더 동기화를 직접 지원하지 않습니다. 결정된 시간을 구글 캘린더 이벤트로 직접 만들고 멤버를 초대하세요. DateDate는 조율 단계, 캘린더 이벤트는 기록 단계로 역할을 분리합니다.

# ===== Use Case: travel-planning (5-section content) =====
seo.useCase.travel-planning.section.intro=여러 명이 함께 가는 여행은 "갈래?"의 가벼운 합의에서 시작하지만, 막상 출발일과 돌아오는 날을 잡으려면 휴가 결재·항공권 가격·환율·동행 휴가 정책까지 한꺼번에 봐야 합니다. 가족 4명, 친구 6명, 동호회 8명짜리 여행 페이지를 DateDate에 만들면, 가능 출발일 후보가 한 화면에 모이고 모두의 휴가 패턴이 비교됩니다. 출발일 + 도착일을 두 차례 투표로 분리해 진행하면 성수기·항공권 변동을 함께 검토할 수 있습니다.

seo.useCase.travel-planning.section.whenToUse.title=여행 일정 페이지가 빛나는 순간
seo.useCase.travel-planning.section.whenToUse.lead=여행은 결정 비용이 큰 만큼 후보 좁히기 + 합의 + 항공권 결제의 흐름에서 페이지가 단계마다 도움이 됩니다.
seo.useCase.travel-planning.section.whenToUse.scenario1.title=가족 여행 (3-5명)
seo.useCase.travel-planning.section.whenToUse.scenario1.text=가족 여행은 부모님 직장·자녀 학교·배우자 휴가가 모두 다릅니다. 출국일 후보 4-5개를 페이지에서 받고, 가능한 사람이 가장 많은 날짜를 우선으로 보세요. 부모님 일정과 자녀 방학이 겹치는 날만 후보에 들어갑니다.
seo.useCase.travel-planning.section.whenToUse.scenario2.title=친구·커플 해외여행 (4-6명)
seo.useCase.travel-planning.section.whenToUse.scenario2.text=해외여행은 출발일이 1주 다를 때 항공권 가격이 크게 차이 납니다. 페이지에 가능 날짜를 받고, 그 후보로 항공권 검색을 한 번에 돌리세요. 항공권을 결제하면 일정 변경 비용이 급격히 커지므로 결제 전에 모든 인원의 확정을 받아야 합니다.
seo.useCase.travel-planning.section.whenToUse.scenario3.title=동호회·팀 빌딩 (6-8명)
seo.useCase.travel-planning.section.whenToUse.scenario3.text=사내 팀빌딩 1박2일이나 동호회 주말 여행은 인원이 많아 한 명이라도 빠지면 분담 비용이 흔들립니다. 페이지에 출발일 후보를 받되, 최소 참가 인원 6명 같은 조건을 description에 명시해 인원이 모자랄 때 자동 취소 기준을 만들어 두세요.

seo.useCase.travel-planning.section.mistakes.title=여행 일정 잡기, 흔한 실수
seo.useCase.travel-planning.section.mistakes.lead=여행은 결제와 휴가 결재가 얽혀 일반 약속보다 변경 비용이 훨씬 큽니다. 다음 패턴을 먼저 끊으세요.
seo.useCase.travel-planning.section.mistakes.mistake1.problem=항공권 결제 후 일정 변경 요청: "좀 더 일찍 출발하면 안 될까?" 톡이 결제 다음 날 도착하는 패턴. 변경 수수료로 1인당 10-30만 원이 사라집니다.
seo.useCase.travel-planning.section.mistakes.mistake1.fix=DateDate 페이지에서 가능 날짜를 모두 받고, 마감 시점에 항공권 결제 시점에 일정 확정임을 description에 명시하세요. 결제 후 변경 요청은 본인이 수수료를 부담하는 룰을 미리 합의합니다.
seo.useCase.travel-planning.section.mistakes.mistake2.problem=휴가 결재가 늦어 마감 직전에 "휴가 못 받았어요" 통보. 다른 인원의 항공권/숙소 예약이 흔들립니다.
seo.useCase.travel-planning.section.mistakes.mistake2.fix=출발일 후보가 좁혀진 시점에 휴가 결재 마감일을 정해 페이지에 표시하세요(예: 출발 6주 전). 그 시점까지 결재 못 받은 멤버는 확정 인원에서 일단 제외하고 대기 상태로 표시해 항공권/숙소 예약을 확정 인원 기준으로 진행합니다. 결재가 뒤늦게 통과되면 잔여 자리에 합류할 수 있는지 검토합니다.
seo.useCase.travel-planning.section.mistakes.mistake3.problem=출국일·귀국일을 한 번에 정하려 함: 가능 날짜가 너무 좁아져 후보가 0개가 되고, 결국 누군가 양보를 강요받습니다.
seo.useCase.travel-planning.section.mistakes.mistake3.fix=출국일 투표와 귀국일 투표를 분리하세요. 출국일을 먼저 정해 항공권을 봤다가, 도착 후 일정 길이를 다시 투표받습니다. 페이지의 메뉴 투표를 "3박4일 / 4박5일 / 5박6일" 후보로 활용할 수 있습니다.

seo.useCase.travel-planning.section.tips.title=여행을 매끄럽게 잡는 팁
seo.useCase.travel-planning.section.tips.tip1.title=출발일/귀국일 분리 투표
seo.useCase.travel-planning.section.tips.tip1.text=출발일 후보를 먼저 좁히고, 항공권 가격 추세를 본 뒤 귀국일을 두 번째 투표로 결정하세요. 한 번에 여행 길이까지 정하려 하면 가능 인원이 급격히 줄어듭니다.
seo.useCase.travel-planning.section.tips.tip2.title=휴가 결재 마감일 명시
seo.useCase.travel-planning.section.tips.tip2.text=출발 6-8주 전에 휴가 결재를 받지 못한 멤버는 확정 인원에서 제외하고 대기 상태로 관리한다는 룰을 페이지 description에 적습니다. 마감일이 없으면 결재가 안 된 상태로 출발 직전까지 결정이 미뤄집니다.
seo.useCase.travel-planning.section.tips.tip3.title=예산 상한 미리 합의
seo.useCase.travel-planning.section.tips.tip3.text=1인당 항공권+숙박 상한을 사전에 합의하면 항공권 검색 시간이 줄어듭니다. 한 명의 "이 호텔 너무 비싸" 코멘트로 검색이 처음으로 돌아가는 일을 막을 수 있습니다.
seo.useCase.travel-planning.section.tips.tip4.title=외부 도구와 분업
seo.useCase.travel-planning.section.tips.tip4.text=DateDate가 언제 갈지를 정하면, 항공권은 스카이스캐너·구글 플라이트로, 숙소는 부킹닷컴·에어비앤비로 각자 검색합니다. 모두에게 한 도구를 강제하지 마세요. DateDate는 조율 단계만 맡습니다.

seo.useCase.travel-planning.section.faq.q1=8명을 넘는 여행 페이지를 만들 수 있나요?
seo.useCase.travel-planning.section.faq.a1=DateDate는 8명까지 권장합니다. 9명 이상이면 색상 구분이 어려워지고 결제 분담 계산도 복잡해집니다. 그 이상은 코어 결정 그룹 5-6명이 출발일을 정하고, 나머지는 결정에 따르는 구조가 효율적입니다.
seo.useCase.travel-planning.section.faq.q2=여행 후보지(파리/일본/제주)도 페이지에서 투표할 수 있나요?
seo.useCase.travel-planning.section.faq.a2=네. 장소 투표 기능에 후보지를 추가하고 멤버에게 투표받으면 됩니다. 단 여행지 결정과 일정 결정은 여행지 먼저, 일정은 그 다음 순서로 진행하세요. 여행지에 따라 비행 시간·시차·성수기가 달라져 일정 후보가 달라집니다.
seo.useCase.travel-planning.section.faq.q3=참여자가 도중에 빠지면 분담금은 어떻게 처리되나요?
seo.useCase.travel-planning.section.faq.a3=DateDate는 분담금 계산을 직접 처리하지 않습니다. 분담 정책은 페이지 description에 미리 명시하세요(예: "결제 후 취소 시 항공권은 본인 부담, 숙소는 잔여 인원 분담"). 분담 자체는 토스 더치페이·카카오뱅크 모임 통장 같은 도구를 병행합니다.
seo.useCase.travel-planning.section.faq.q4=환율이 크게 변하면 일정을 다시 잡아야 하나요?
seo.useCase.travel-planning.section.faq.a4=환율 변동만으로 일정을 다시 잡는 경우는 거의 없습니다. 다만 출발 8주 전 환율이 출발 시점 대비 5% 이상 차이 나면 예산 상한을 페이지에 다시 합의하는 것을 권장합니다. 일정은 유지하되 항공권/숙소 등급을 조정합니다.
seo.useCase.travel-planning.section.faq.q5=여행 후 페이지를 삭제하고 싶어요.
seo.useCase.travel-planning.section.faq.a5=DateDate 대시보드에서 일정 단위로 삭제할 수 있습니다. 단 같은 페이지 ID로 다음 여행을 잡을 계획이라면 멤버 명단이 자동 복제되는 이점이 있어 남겨두기가 효율적입니다. 페이지 ID 자체의 삭제는 의견 보내기 폼으로 요청하시면 검토합니다.

# ===== Use Case: study-group (5-section content) =====
seo.useCase.study-group.section.intro=스터디 그룹은 한 번의 약속이 아니라 반복 모임이라는 점에서 일반 친구 모임과 다릅니다. 매주 같은 시간에 만나기로 한 코딩 스터디·독서 모임도 시험 기간이나 공휴일에 한 회차 빠지면 진도가 흔들립니다. 스터디용 DateDate 페이지는 정기 일정에 더해 예외 회차 (보강·휴강·장소 변경) 를 같은 페이지에서 처리합니다. 매월 페이지를 재사용하면서 진도표·장소·메뉴까지 한 화면에서 관리합니다.

seo.useCase.study-group.section.whenToUse.title=스터디 페이지가 필요한 순간
seo.useCase.study-group.section.whenToUse.lead=정기성이 핵심인 스터디는 "이번 주 가능?" 이 아니라 어떤 회차에 누가 빠지는가를 추적하는 게 중요합니다.
seo.useCase.study-group.section.whenToUse.scenario1.title=코딩·자격증 스터디 (5-6명)
seo.useCase.study-group.section.whenToUse.scenario1.text=정보처리기사·AWS·코딩 테스트 준비처럼 시험일이 정해진 스터디는 시험 D-30 ~ D-7 구간에 회차가 늘어납니다. 페이지에 매주 정기 일정과 보강 후보 일정을 함께 두고, 보강 일정은 멤버 다수가 가능한 날만 진행합니다.
seo.useCase.study-group.section.whenToUse.scenario2.title=독서·인문 모임 (4-6명)
seo.useCase.study-group.section.whenToUse.scenario2.text=월 2회 독서 모임처럼 한 회차당 도서 1권을 읽어와야 하는 모임은 책 분량에 따라 회차 간격이 달라집니다. 페이지에 다음 회차 후보 3개를 두고, 분량이 많으면 3주 후, 적으면 2주 후로 좁힙니다.
seo.useCase.study-group.section.whenToUse.scenario3.title=동아리·서클 정기 모임
seo.useCase.study-group.section.whenToUse.scenario3.text=동아리는 인원이 8명 이상일 때가 많지만 매 회차에 모두 오지는 않습니다. 코어 멤버 6명을 기준으로 페이지를 만들고, 게스트는 description에 명시한 외부 단톡방으로 안내합니다.

seo.useCase.study-group.section.mistakes.title=스터디 일정 운영, 흔한 실수
seo.useCase.study-group.section.mistakes.lead=스터디는 유지가 가장 어려운 모임입니다. 다음 패턴이 보이면 한두 회차 안에 자연 소멸로 가는 신호입니다.
seo.useCase.study-group.section.mistakes.mistake1.problem=시험 직전 갑자기 빠지는 멤버: "이번 주는 시험 준비" 톡이 회차 전날 도착해 발표 분담이 무너집니다.
seo.useCase.study-group.section.mistakes.mistake1.fix=정기 회차 시작 시점에 결석 사전 통보 마감을 페이지에 명시하세요(예: 회차 48시간 전). 그 이후 결석은 발표 분담을 급하게 재배정하지 않고, 본인이 다음 회차 전에 해당 범위를 보완하거나 자료·녹화본을 그룹에 공유하는 책임으로 처리합니다.
seo.useCase.study-group.section.mistakes.mistake2.problem=진도가 안 나가는 회차: 매번 "오늘 어디까지 했죠?" 로 시작해 첫 30분이 사라지는 패턴.
seo.useCase.study-group.section.mistakes.mistake2.fix=페이지 description에 다음 회차 진도(예: "3장 끝까지 + 연습문제 5번")를 명시하세요. 회차 1시간 전에 멤버에게 한 줄 리마인드를 보내면 시작 5분 안에 본문 진입이 가능합니다.
seo.useCase.study-group.section.mistakes.mistake3.problem=장소가 매주 다름: 카페 a, b, c를 돌다가 한 곳이 갑자기 만석이라 30분 늦게 시작.
seo.useCase.study-group.section.mistakes.mistake3.fix=DateDate 장소 투표로 고정 장소 1곳 + 백업 1곳을 미리 정해두세요. 정기 모임에서 장소가 자주 바뀌는 만큼 시작 지연이 누적됩니다. 도서관 스터디룸·고정 카페 같은 장소가 안전합니다.

seo.useCase.study-group.section.tips.title=스터디를 길게 끌고 가는 팁
seo.useCase.study-group.section.tips.tip1.title=정기 + 보강 슬롯 분리
seo.useCase.study-group.section.tips.tip1.text=매주 토요일 14:00 같은 정기 일정과, 멤버 다수가 결석한 회차의 보강 슬롯을 페이지에 분리해 두세요. 정기는 자동 진행, 보강은 가능 인원 4명 이상일 때만 추가합니다.
seo.useCase.study-group.section.tips.tip2.title=진도표를 페이지 description에
seo.useCase.study-group.section.tips.tip2.text=다음 회차에 다룰 챕터·문제 번호·발표자를 description에 적어두면 멤버가 사전 준비 가능합니다. 진도표가 흩어져 있으면 한두 명이 미리 안 봐서 진도가 한 회차 미뤄집니다.
seo.useCase.study-group.section.tips.tip3.title=장소 1곳 고정
seo.useCase.study-group.section.tips.tip3.text=정기 스터디는 장소를 매번 투표하지 말고 1곳 고정하세요. 도서관 스터디룸 예약·카페 자리 잡기에 드는 인지 비용이 사라집니다. 백업 장소만 description에 미리 정해두면 충분합니다.
seo.useCase.study-group.section.tips.tip4.title=Discord/Slack과 역할 분담
seo.useCase.study-group.section.tips.tip4.text=DateDate는 언제 만날지를 결정하고, 회차 사이의 진도 토론·질문은 Discord나 Slack 채널에서 이어가세요. 단톡방·DateDate·Notion 세 도구가 각자 한 가지씩만 맡으면 정보가 흩어지지 않습니다.

seo.useCase.study-group.section.faq.q1=정기 회차를 페이지 하나로 무한히 이어갈 수 있나요?
seo.useCase.study-group.section.faq.a1=네. 같은 페이지 ID에 매월 새 일정(예: datedate.site/coding-study/2026/02)을 만들면 멤버 명단이 자동 복제됩니다. 한 학기·한 분기 단위로 페이지를 새로 만들 필요가 없습니다.
seo.useCase.study-group.section.faq.q2=스터디 멤버가 도중에 빠지면 어떻게 처리하나요?
seo.useCase.study-group.section.faq.a2=DateDate 대시보드에서 해당 멤버의 향후 일정을 빈 상태로 두면 됩니다. 멤버 자체를 페이지에서 삭제하면 과거 회차 기록이 사라지므로, 활동을 멈춘 멤버는 결석 표시만 유지하는 것이 안전합니다.
seo.useCase.study-group.section.faq.q3=보강 회차를 정규 회차와 어떻게 구분하나요?
seo.useCase.study-group.section.faq.a3=DateDate는 정규/보강 구분 기능을 직접 제공하지 않습니다. 우회 방법으로 정규는 일정 제목을 "R3 정규", 보강은 "R3 보강" 처럼 구분해 적으세요. 진도 추적은 description에서 합니다.
seo.useCase.study-group.section.faq.q4=시험 기간에 1-2주 휴강하고 다시 시작할 수 있나요?
seo.useCase.study-group.section.faq.a4=네. 휴강 주에는 페이지에 일정을 추가하지 않으면 됩니다. 다음 주에 새 일정을 만들면 자동으로 휴강 주가 빈 상태로 표시됩니다. 멤버 명단은 그대로 유지됩니다.
seo.useCase.study-group.section.faq.q5=스터디 자료(PDF·코드)를 페이지에 첨부할 수 있나요?
seo.useCase.study-group.section.faq.a5=DateDate는 파일 첨부를 직접 지원하지 않습니다. 자료는 Notion·구글 드라이브·GitHub에 두고, 그 링크를 페이지의 메뉴 투표나 description에 적어두세요. DateDate는 모이는 시간에 집중하고 자료 관리는 외부 도구에 맡기는 분업이 효율적입니다.
seo.useCase.club-activity.section.intro=동호회는 한 번의 약속이 아니라 회원이 들고 나는 상시 모임이라는 점에서 친구 모임이나 일회성 약속과 다릅니다. 회원 15명 중 이번 주에 실제로 나오는 사람은 6~10명, 그것도 매번 바뀝니다. 단톡방 공지로는 "이번 주 몇 명 와요?" 가 매주 반복되고, 코트·구장·뒤풀이 인원을 가늠하기 어렵습니다. 동호회용 DateDate 페이지는 회차별 참석 인원을 미리 모아 보여주고, 매주 정기 활동과 분기 번개를 같은 페이지에서 관리합니다.
seo.useCase.club-activity.section.whenToUse.title=동호회에서 DateDate를 쓰는 순간
seo.useCase.club-activity.section.whenToUse.lead=동호회 운영의 핵심은 "누가 되냐" 가 아니라 이번 회차에 몇 명이 실제로 나오는가입니다. 다음 상황에서 페이지 하나가 단톡방 공지를 대체합니다.
seo.useCase.club-activity.section.whenToUse.scenario1.title=매주 정기 운동 (테니스·풋살·배드민턴)
seo.useCase.club-activity.section.whenToUse.scenario1.text=코트나 구장은 인원수만큼 예약해야 합니다. 매주 페이지에서 참석을 받으면 4명이면 단식 2면, 8명이면 복식 코트 식으로 예약 규모를 미리 정할 수 있습니다. 참석 마감 인원으로 코트를 잡으면 노쇼로 코트비가 비는 일이 줄어듭니다.
seo.useCase.club-activity.section.whenToUse.scenario2.title=분기 번개·외부 행사 (등산·캠핑·대회 출전)
seo.useCase.club-activity.section.whenToUse.scenario2.text=정기 활동 외에 분기 1회 산행이나 아마추어 대회 출전처럼 큰 행사는 날짜 후보가 여럿입니다. 회원 다수가 가능한 주말을 페이지에서 좁히고, 집결 장소·교통편 투표까지 한 화면에서 정합니다.
seo.useCase.club-activity.section.whenToUse.scenario3.title=신규 회원 합류·시즌 시작
seo.useCase.club-activity.section.whenToUse.scenario3.text=새 시즌이 시작되거나 신입 회원이 들어오는 시점에는 명단과 주로 나오는 요일이 한꺼번에 바뀝니다. 페이지에 회원을 추가하고 링크만 다시 돌리면, 누가 어떤 요일에 주로 참석하는지 한눈에 정리됩니다.
seo.useCase.club-activity.section.mistakes.title=동호회 일정 운영, 흔한 실수
seo.useCase.club-activity.section.mistakes.lead=동호회는 인원이 많아 소수의 운영진이 일정을 떠안기 쉽습니다. 다음 패턴이 보이면 운영진이 지쳐 모임이 흐지부지되는 신호입니다.
seo.useCase.club-activity.section.mistakes.mistake1.problem=단톡방 공지로만 참석 받기: "이번 주 토요일 테니스 오실 분?" 공지가 잡담에 묻혀 답이 3~4명만 옵니다.
seo.useCase.club-activity.section.mistakes.mistake1.fix=공지 대신 DateDate 링크 + 참석 마감을 고정하세요(예: "목요일 밤까지 클릭"). 마감 시점의 참석 인원으로 코트 수를 확정하면 당일 인원 변동에 휘둘리지 않습니다.
seo.useCase.club-activity.section.mistakes.mistake2.problem=운영진 한 명이 매번 인원 집계: 단톡방을 스크롤하며 "오는 사람" 을 손으로 세다 운영진이 번아웃됩니다.
seo.useCase.club-activity.section.mistakes.mistake2.fix=참석 집계를 페이지에 위임하세요. 회원이 직접 본인 참석을 표시하면 운영진은 결과만 봅니다. 집계 노동이 사라지면 운영진 교체 부담도 줄어듭니다.
seo.useCase.club-activity.section.mistakes.mistake3.problem=노쇼 누적: 참석한다고 해놓고 안 와서 코트비·회비 정산이 매번 어긋납니다.
seo.useCase.club-activity.section.mistakes.mistake3.fix=참석 마감 후 변경은 본인이 단톡방에 직접 고지하도록 규칙을 정하세요. 페이지의 회차별 참석 기록이 쌓이면 반복 노쇼 회원이 드러나, 회비 선납 대상으로 따로 관리할 수 있습니다.
seo.useCase.club-activity.section.tips.title=동호회를 오래 유지하는 팁
seo.useCase.club-activity.section.tips.tip1.title=참석 마감 시한 고정
seo.useCase.club-activity.section.tips.tip1.text="매주 목요일 밤 = 이번 주 참석 마감" 처럼 요일을 고정하면 회원이 리듬을 익혀 응답률이 올라갑니다. 마감이 유동적이면 운영진이 매번 독촉해야 합니다.
seo.useCase.club-activity.section.tips.tip2.title=회원 명단 미리 등록
seo.useCase.club-activity.section.tips.tip2.text=페이지를 만들 때 정회원 이름을 미리 한 줄씩 추가해 두면, 회원은 "내 이름 클릭 → 가능 날짜 클릭" 두 번이면 끝납니다. 신규 회원만 그때그때 추가하면 됩니다.
seo.useCase.club-activity.section.tips.tip3.title=정기 활동과 번개 분리
seo.useCase.club-activity.section.tips.tip3.text=매주 정기 운동과 분기 번개는 성격이 다릅니다. 정기는 참석만 받고, 번개는 날짜 후보를 여러 개 두고 다수결로 정하세요. 한 페이지의 월/년을 바꿔가며 둘 다 관리할 수 있습니다.
seo.useCase.club-activity.section.tips.tip4.title=장소·코트 투표 동시 진행
seo.useCase.club-activity.section.tips.tip4.text=DateDate의 장소 투표로 코트·구장·뒤풀이 장소를 날짜와 함께 정하세요. 운동 모임은 장소 예약이 날짜만큼 중요한데, 단톡방을 두 번 도배할 필요 없이 한 화면에서 끝납니다.
seo.useCase.club-activity.section.faq.q1=회원이 20명이 넘는데 페이지 하나로 되나요?
seo.useCase.club-activity.section.faq.a1=DateDate는 한 페이지당 최대 8명을 권장합니다. 20명 규모 동호회는 매 회차 실제 참석 코어 6~8명을 기준으로 페이지를 운영하고, 나머지 회원에게는 확정된 날짜·장소만 단톡방으로 공지하는 구조가 효율적입니다. 출석이 잦은 회원 위주로 페이지를 채우세요.
seo.useCase.club-activity.section.faq.q2=매주 같은 페이지를 계속 쓸 수 있나요?
seo.useCase.club-activity.section.faq.a2=네. 같은 동호회 ID의 다음 달 일정(예: datedate.site/tennis-club/2026/02)으로 이동하면 회원 명단이 자동 복제됩니다. 매달 페이지를 새로 만들 필요 없이 월만 바꿔 정기 활동을 이어갑니다.
seo.useCase.club-activity.section.faq.q3=신규 회원은 어떻게 추가하나요?
seo.useCase.club-activity.section.faq.a3=페이지에서 참여자 추가로 신규 회원 이름을 넣고 링크를 다시 공유하면 됩니다. 최대 8명 권장 한도 안에서 활동이 뜸한 회원과 교체해 운영하면 명단이 항상 실제 참석자로 유지됩니다.
seo.useCase.club-activity.section.faq.q4=참석한다고 한 회원이 안 오면(노쇼) 어떻게 하나요?
seo.useCase.club-activity.section.faq.a4=참석 마감 시점의 인원으로 코트·장소를 예약하되, 마감 후 불참은 본인이 단톡방에 직접 고지하도록 규칙화하세요. 페이지의 회차별 참석 기록이 쌓이면 반복 노쇼 회원이 드러나 회비 선납 등으로 따로 관리할 수 있습니다.
seo.useCase.club-activity.section.faq.q5=링크가 외부로 새면 모르는 사람이 들어올 수 있나요?
seo.useCase.club-activity.section.faq.a5=링크를 아는 누구나 이름을 넣고 참석을 표시할 수 있습니다. 공개 모집 동호회가 아니라면 ID에 추측이 어려운 문자열을 섞으세요(예: tennis-club-k7q9). 공개 모임이라면 오히려 이 점을 활용해 카페·SNS에 링크를 그대로 공유해 신규 회원을 받을 수 있습니다.

# ===== Date Diff Tool Body Sections =====
tool.datediff.section.when.title=언제 날짜 계산기가 필요한가요
tool.datediff.section.when.body=날짜 차이는 한 번 손으로 세려고 하면 의외로 까다롭습니다. 31일짜리 달과 30일짜리 달이 섞이고, 윤년이 있고, 시작일을 포함할지 말지 헷갈립니다. 다음 상황에서 이 도구가 정확한 답을 줍니다.
tool.datediff.section.when.case1=<strong>D-Day / 기념일</strong> — 결혼기념일, 사귄 지 100일·200일·1000일, 출산 예정일, 시험일까지의 남은 일수.
tool.datediff.section.when.case2=<strong>계약·정기 결제</strong> — 임대차 계약 만료일, 보험·구독 갱신일, 보증 만료일. 미리 며칠 전에 알림을 잡을 때 정확한 영업일 기준 일수가 필요합니다.
tool.datediff.section.when.case3=<strong>프로젝트·여행 일정</strong> — 출시일까지 남은 스프린트 수(주 단위), 휴가 출국일까지 남은 영업일 수.

tool.datediff.section.workdays.title=영업일 계산이 다른 이유
tool.datediff.section.workdays.body=평일만 계산 옵션은 시작일부터 종료일까지의 기간에서 토요일과 일요일을 제외하고 카운트합니다. 시작일은 포함하고 종료일은 포함하지 않는 시작 포함, 종료 미포함 기준으로, 엑셀의 <code>NETWORKDAYS</code> 함수와 동일한 셈법입니다. 이 방식이 일반 달력 기준 일수와 다른 이유는 명확합니다 — 7일짜리 기간에 주말이 2일이면 영업일은 5일이지만, 토요일에 시작해 다음 주 금요일에 끝나면 같은 7일에서 영업일은 4일이 됩니다. 시작 요일에 따라 결과가 바뀐다는 점을 기억하세요.
tool.datediff.section.workdays.note=현재 도구는 한국·미국 공휴일을 자동으로 빼지 않습니다. 정확한 업무일 산정이 필요하면 공휴일 수를 빼서 직접 보정해야 합니다 (예: 9일짜리 기간에 추석 3일 → 6일).

tool.datediff.section.faq.title=자주 묻는 질문
tool.datediff.section.faq.q1=주말은 포함되나요?
tool.datediff.section.faq.a1=기본 계산은 토요일·일요일을 모두 포함합니다. 평일만 계산 옵션을 켜면 주말이 빠집니다.
tool.datediff.section.faq.q2=공휴일도 자동으로 제외되나요?
tool.datediff.section.faq.a2=공휴일은 자동 처리되지 않습니다. 한국 설·추석·국경일이나 해외 공휴일을 정확히 빼야 한다면 결과에서 직접 빼서 사용하세요. 향후 공휴일 자동 보정 기능을 검토 중입니다.
tool.datediff.section.faq.q3=음력 날짜도 계산할 수 있나요?
tool.datediff.section.faq.a3=현재는 양력 날짜만 입력 가능합니다. 음력 기념일을 계산하려면 음력 → 양력 변환 후 입력하세요. 한국천문연구원의 음양력 변환을 참고하면 좋습니다.

tool.datediff.section.related.title=관련 페이지
tool.datediff.section.related.body=날짜 계산이 끝났다면, 다음 도구도 함께 사용해 보세요.
tool.datediff.section.related.guideLabel=DateDate 사용 가이드
tool.datediff.section.related.guideDesc=여러 명이 함께 약속 날짜를 잡을 때 활용하는 5단계 가이드.
tool.datediff.section.related.useCaseLabel=팀 회의 일정 조율
tool.datediff.section.related.useCaseDesc=프로젝트 마감일이 정해졌다면 팀원과 회의 시간을 빠르게 정해보세요.

