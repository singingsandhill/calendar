# ===== SEO Home =====
seo.home.title=DateDate - 약속 잡기 | 여러명이서 쉽게 날짜 조율하기
seo.home.description=링크 하나로 날짜, 장소, 메뉴까지 한번에 정하세요. 가입 없이 무료로 그룹 일정을 조율할 수 있습니다.
seo.home.keywords=약속 잡기, 일정 조율, 날짜 선택, 그룹 스케줄링, 캘린더, 모임 일정, date picker, scheduling, 회의 일정
seo.home.ogTitle=DateDate - 여러명이서 쉽게 날짜 조율하기
seo.home.ogDescription=카톡방에서 날짜 조율 그만. 링크 하나로 날짜·장소·메뉴를 한번에 정하세요.
seo.home.appName=DateDate
seo.home.appAlternateName=약속 잡기
seo.home.appDescription=링크 하나로 날짜, 장소, 메뉴까지 한번에 정하세요. 가입 없이 무료로 그룹 일정을 조율할 수 있습니다.
seo.home.orgDescription=여러명이서 쉽게 날짜 조율하기. 링크 하나로 날짜, 장소, 메뉴까지 한번에 정하세요.
seo.home.faq.q1=무료인가요? 가입이 필요한가요?
seo.home.faq.a1=완전 무료, 가입 없이 바로 사용할 수 있습니다. ID 입력만으로 페이지가 생성되고, 참여자도 링크만으로 참여합니다.
seo.home.faq.q2=참여자가 날짜를 수정할 수 있나요?
seo.home.faq.a2=네. 드롭다운에서 이름을 선택하고 날짜를 다시 고른 뒤 저장하면 됩니다.
seo.home.faq.q3=장소나 메뉴 투표는 어떻게 하나요?
seo.home.faq.a3=일정 페이지 하단에서 장소·메뉴를 제안하고 투표하세요. 중복 투표 가능하며, 메뉴에는 배달앱 링크도 첨부할 수 있습니다.
seo.home.faq.q4=일정 데이터는 얼마나 보관되나요?
seo.home.faq.a4=삭제하지 않는 한 계속 보관됩니다. 대시보드에서 언제든 확인·관리 가능합니다.
seo.home.faq.q5=내 페이지 ID가 이미 사용 중이면?
seo.home.faq.a5=해당 페이지의 대시보드로 이동합니다. 숫자나 하이픈을 조합해 고유한 ID를 만드세요. 예: my-team-2025
seo.home.faq.q6=링크를 공유하면 누구나 참여할 수 있나요?
seo.home.faq.a6=네, 링크를 아는 사람은 누구나 참여할 수 있습니다. 신뢰할 수 있는 사람에게만 공유하세요.

