seo.faq.title=자주 묻는 질문 (FAQ) | DateDate
seo.faq.description=DateDate 사용법에 대한 자주 묻는 질문입니다. 무료 여부, 참여 방법, 데이터 보관, 모바일 사용 등을 안내합니다.
seo.faq.keywords=DateDate FAQ, 약속 잡기 앱 질문, 그룹 일정 조율 방법, 날짜 선택 앱
seo.faq.ogTitle=자주 묻는 질문 | DateDate
seo.faq.ogDescription=DateDate 사용법, 무료 여부, 참여 방법 등 자주 묻는 질문을 모았습니다.
seo.faq.q1=DateDate는 무료인가요?
seo.faq.a1=완전 무료입니다. 가입, 설치, 결제 없이 URL 하나로 바로 사용할 수 있습니다.
seo.faq.q2=몇 명까지 참여할 수 있나요?
seo.faq.a2=일정 하나당 최대 8명이 참여할 수 있습니다. 각 참여자는 고유한 색상으로 표시됩니다.
seo.faq.q3=링크를 받은 참여자는 어떻게 하나요?
seo.faq.a3=링크를 열면 바로 일정 페이지로 연결됩니다. 이름을 선택하거나 추가한 뒤 캘린더에서 가능한 날짜를 클릭하고 저장하면 됩니다.
seo.faq.q4=데이터는 얼마나 보관되나요?
seo.faq.a4=생성된 일정 데이터는 서비스 서버에 보관됩니다. 불필요한 일정은 대시보드에서 직접 삭제할 수 있습니다.
seo.faq.q5=모바일에서도 사용할 수 있나요?
seo.faq.a5=네, 모든 기기에서 사용할 수 있습니다. 별도 앱 설치 없이 모바일 브라우저에서 바로 이용 가능합니다.
seo.faq.q6=장소와 메뉴 투표는 어떻게 하나요?
seo.faq.a6=일정 페이지 하단에 장소/메뉴 투표 섹션이 있습니다. 장소나 메뉴를 제안하고 투표 버튼을 눌러 참여하세요.

