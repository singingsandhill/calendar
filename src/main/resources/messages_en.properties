seo.useCase.study-group.title=Study Group Scheduling
seo.useCase.study-group.description=Easily schedule study groups, book clubs, and recurring meetups. Pool everyone's availability to pick regular dates.
seo.useCase.study-group.body=Setting a regular date for a study group is harder than it sounds. With DateDate, members pick their available dates and you quickly find the day the most people can attend. Coding study, book clubs, language study, certification prep, college clubs — it works for any group. You can also vote on venues (cafe vs. study room vs. library) all in one step. Create a new schedule each month to make it a recurring habit.
