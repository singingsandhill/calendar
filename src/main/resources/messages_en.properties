# ===== Use Case: friend-meetup (5-section content) =====
seo.useCase.friend-meetup.section.intro=Coordinating a date with friends sounds simple until five people drop replies into a group chat over four days, you scroll back to count who actually answered, and someone's plan changed by Friday anyway. A friend-meetup DateDate page replaces that thread with one screen: everyone clicks their open dates and the overlapping days surface automatically. The same page also handles a vote on the meeting spot and the meal, which compresses what used to take days of back-and-forth into a single short conversation.

seo.useCase.friend-meetup.section.whenToUse.title=When friend-meetup pages help
seo.useCase.friend-meetup.section.whenToUse.lead=Friend groups are small but rarely on the same calendar. The situations below are where one shared page replaces the usual chat thread.
seo.useCase.friend-meetup.section.whenToUse.scenario1.title=Reunions and milestone meetups
seo.useCase.friend-meetup.section.whenToUse.scenario1.text=College friends meeting once a year, or a 10-year-out cohort dinner. Schedules diverge — full-time job, grad school, parenting — and a single date never clears. Open the page four weeks ahead, ask everyone to click every available date, and the dates where five out of seven are free show up in the heaviest color.
seo.useCase.friend-meetup.section.whenToUse.scenario2.title=Recurring monthly meetups
seo.useCase.friend-meetup.section.whenToUse.scenario2.text=A monthly dinner where the date itself shifts each time. Reuse the same page ID and just change the year/month in the URL (for example, datedate.site/college-friends/2026/02). Names and votes from last month carry over, so the input cost for the next round is near zero.
seo.useCase.friend-meetup.section.whenToUse.scenario3.title=Last-minute weekend plans
seo.useCase.friend-meetup.section.whenToUse.scenario3.text=It's Wednesday and someone wants drinks this weekend or next. Send four or five friends one link with a 24-hour reply window. Date and venue are usually settled within the evening — and you can vote on bar versus pizza place in the same page rather than starting another thread.

seo.useCase.friend-meetup.section.mistakes.title=Common friend-scheduling mistakes
seo.useCase.friend-meetup.section.mistakes.lead=Most failed friend meetups follow the same pattern. Switching to a shared page is half the fix; the other half is breaking the habits below.
seo.useCase.friend-meetup.section.mistakes.mistake1.problem=Spamming "when works for you?" in the chat — answers trickle in over days, several friends never reply, and someone gives up.
seo.useCase.friend-meetup.section.mistakes.mistake1.fix=Pair the page link with a clear reply deadline ("please click by Friday midnight"). Send one reminder after the deadline, then proceed without the no-shows.
seo.useCase.friend-meetup.section.mistakes.mistake2.problem=Letting the organizer's calendar dominate — "I'm free all Saturday" becomes the default, and only two friends can actually make it.
seo.useCase.friend-meetup.section.mistakes.mistake2.fix=Treat the organizer like any other participant. Optimize for the date that three or four out of five can attend, even if the organizer has to skip one slot.
seo.useCase.friend-meetup.section.mistakes.mistake3.problem=Last-minute schedule changes — the date is locked Friday, then on Tuesday one friend asks to push it by a week.
seo.useCase.friend-meetup.section.mistakes.mistake3.fix=Send a confirmation message about a week before the meetup. After that, treat any change request as "reschedule the whole thing." Bending the date for one person blows up the next meetup too.

seo.useCase.friend-meetup.section.tips.title=Tips for moving fast
seo.useCase.friend-meetup.section.tips.tip1.title=Set a reply deadline
seo.useCase.friend-meetup.section.tips.tip1.text=Always include "please reply within 24 hours" or a date. Without a deadline, the response window stretches indefinitely and the organizer eventually gives up.
seo.useCase.friend-meetup.section.tips.tip2.title=Vote on the spot and meal in the same page
seo.useCase.friend-meetup.section.tips.tip2.text=DateDate combines date selection with a vote on location and menu in one URL. Tools like Doodle and When2meet handle dates only, so coordinating where to go ends up in a separate thread again.
seo.useCase.friend-meetup.section.tips.tip3.title=Pre-add the regulars
seo.useCase.friend-meetup.section.tips.tip3.text=When you create the page, type in the names of the five to eight regulars. When friends open the link they tap their name and click dates — two taps, no typing. Reply rates jump.
seo.useCase.friend-meetup.section.tips.tip4.title=Use a calendar app for the final invite
seo.useCase.friend-meetup.section.tips.tip4.text=Once the date is locked, copy it into Google or Apple Calendar with location, time, and reminders. DateDate handles the *coordination* phase; calendar apps handle the *notification* phase. Don't replace one with the other.

seo.useCase.friend-meetup.section.faq.q1=What if more than 8 friends are invited?
seo.useCase.friend-meetup.section.faq.a1=DateDate caps a page at 8 participants because the calendar color coding gets hard to read past that. For groups of 9 to 12, lock the date with a core 5 or 6, then notify the rest. The math improves and so does the reply rate.
seo.useCase.friend-meetup.section.faq.q2=A friend clicked the wrong dates. Can they edit?
seo.useCase.friend-meetup.section.faq.a2=Yes. They reselect their name from the dropdown, click dates to add or remove, and save. There is no notification to the rest of the group, so editing back and forth is fine.
seo.useCase.friend-meetup.section.faq.q3=What if the link gets shared outside the group?
seo.useCase.friend-meetup.section.faq.a3=Anyone with the link can join the page and add a name. If you want the page private to your friend group, mix random characters into the page ID (for example, friends-x7q9). A hard-to-guess URL is the practical privacy guarantee.
seo.useCase.friend-meetup.section.faq.q4=One friend never replies. How do we move on?
seo.useCase.friend-meetup.section.faq.a4=The dashboard shows you who hasn't responded. Send one direct nudge a day before the deadline, then settle the date with whoever did respond. Three out of four available is good enough — waiting on the fifth never ends well.
seo.useCase.friend-meetup.section.faq.q5=Can next month's meetup reuse this month's participants?
seo.useCase.friend-meetup.section.faq.a5=Yes — the same page ID with a new year/month (for example, datedate.site/college-friends/2026/02) carries over the participant list. You don't re-enter names every month. Just point the next link at the next month and let everyone click their availability.

# ===== Use Case: team-meeting (5-section content) =====
seo.useCase.team-meeting.section.intro=Scheduling a team meeting looks technically simpler than friends — fewer participants, shared work calendar — but mix in time zones, conflicting priorities, and shared meeting room availability and it gets harder. If you anchor on the manager's calendar, half the team ends up with conflicts; if you poll in Slack, the answers scatter across threads. A team-meeting DateDate page collects available times from four to eight people on one screen, and the same page can decide the meeting format (in-person or remote) and length (30 versus 60 minutes). Recurring meetings reuse the same page each cycle.

seo.useCase.team-meeting.section.whenToUse.title=When team-meeting pages help
seo.useCase.team-meeting.section.whenToUse.lead=Meetings have a small available-window problem: you need to narrow a few good candidates precisely. The situations below are where a shared page beats a calendar poll.
seo.useCase.team-meeting.section.whenToUse.scenario1.title=Quarterly OKRs and kickoffs
seo.useCase.team-meeting.section.whenToUse.scenario1.text=A quarterly OKR alignment that needs 4 to 8 people for 90 to 120 minutes is exactly where automatic scheduling assistants struggle. Open a page, ask everyone to click five candidate slots, and the heaviest overlap surfaces in 24 hours. No one has to be the broker.
seo.useCase.team-meeting.section.whenToUse.scenario2.title=Sprint review and retro
seo.useCase.team-meeting.section.whenToUse.scenario2.text=A sprint review and retro on the last day of the sprint is two one-hour blocks. If one person is on PTO, moving to next week disrupts the next sprint. Reuse the same page weekly so the participant list is locked and each week only the date entries change.
seo.useCase.team-meeting.section.whenToUse.scenario3.title=Distributed teams across time zones
seo.useCase.team-meeting.section.whenToUse.scenario3.text=A US/Europe/APAC team has to negotiate three time zones for one meeting. Set the page on a single base time zone (UTC works), let everyone click their availability, and verify the result by converting to each member's local time. The fewer cognitive translations, the fewer scheduling errors.

seo.useCase.team-meeting.section.mistakes.title=Common team-meeting scheduling mistakes
seo.useCase.team-meeting.section.mistakes.lead=Most scheduling friction is not a tool problem; it's a *whose calendar wins* policy problem.
seo.useCase.team-meeting.section.mistakes.mistake1.problem=Anchoring on the manager's calendar — "the lead is open then, please make it work" — quietly loses two or three attendees who couldn't push back.
seo.useCase.team-meeting.section.mistakes.mistake1.fix=The lead clicks availability the same way everyone else does. Optimize for the time three out of four plus the lead can attend. If the best-overlap time excludes the lead, decide based on the meeting purpose — a decision-making meeting can defer until the lead is in, while a status sync or a retro can run with a delegate.
seo.useCase.team-meeting.section.mistakes.mistake2.problem=One person doing all the time-zone math — the US engineer keeps asking "what is that in my time?" and a single conversion error costs an attendee.
seo.useCase.team-meeting.section.mistakes.mistake2.fix=When you propose times, write them in two zones (for example "Tue 14:00 KST / 05:00 UTC") so each member converts once. Tools like worldtimebuddy.com let you eyeball the conversion before clicking.
seo.useCase.team-meeting.section.mistakes.mistake3.problem=Booking the room or the Zoom link only after the time is locked — and discovering nothing's available, so the meeting moves again.
seo.useCase.team-meeting.section.mistakes.mistake3.fix=Once the candidate times are down to three, place tentative holds on a room or generate Zoom links for each. Cancel the unused ones after the final time is picked. Held-not-confirmed is the safest state.

seo.useCase.team-meeting.section.tips.title=Tips for team meetings
seo.useCase.team-meeting.section.tips.tip1.title=Specify the meeting length
seo.useCase.team-meeting.section.tips.tip1.text=Put 30 / 60 / 90 minutes in the page description. Without a length, members reserve longer windows and the candidate set shrinks. A 30-minute meeting can fit slots that a 90-minute meeting can't.
seo.useCase.team-meeting.section.tips.tip2.title=Vote on format with the location vote
seo.useCase.team-meeting.section.tips.tip2.text=Use the location vote for in-person versus remote versus hybrid. List candidate venues ("office", "Zoom", "hybrid — main room") and let members vote. Calendly and Google Calendar handle time only; DateDate decides format on the same page.
seo.useCase.team-meeting.section.tips.tip3.title=Share the agenda before scheduling
seo.useCase.team-meeting.section.tips.tip3.text=Drop the agenda or a Notion link in the description. A meeting without an agenda creates value slowly even when the time is good. For 30 minutes, list four agenda items at five minutes each up front.
seo.useCase.team-meeting.section.tips.tip4.title=Reuse one page for recurring meetings
seo.useCase.team-meeting.section.tips.tip4.text=For weekly or biweekly meetings, lock the page (datedate.site/marketing-team) and only update the dates each cycle. The participant list stops being a re-entry tax — saves five minutes per meeting.

seo.useCase.team-meeting.section.faq.q1=Can I schedule by exact time slots (for example 14:00, 14:30)?
seo.useCase.team-meeting.section.faq.a1=DateDate is optimized for *date* coordination, not 30-minute slot voting. If you need slot-level voting, list candidate times in the description and use the location or menu vote to let members pick a time (treat the menu as a list of time options).
seo.useCase.team-meeting.section.faq.q2=Can people respond anonymously?
seo.useCase.team-meeting.section.faq.a2=No. Each participant has to add or select a name before clicking dates. Names get auto-assigned colors, so the calendar always shows who is available when.
seo.useCase.team-meeting.section.faq.q3=Our team is 11 people. How do we handle that?
seo.useCase.team-meeting.section.faq.a3=An 11-person meeting is usually inefficient anyway. Pick the five or six decision-makers, schedule the core meeting with them, and brief the rest after. Trying to fit 11 calendars produces meetings that don't decide anything.
seo.useCase.team-meeting.section.faq.q4=Someone took new PTO after we picked a meeting time. What now?
seo.useCase.team-meeting.section.faq.a4=Reschedule only when *one person's absence > everyone else clearing their calendar again*. Most of the time it's better to run the meeting without that person and sync 1:1 afterward.
seo.useCase.team-meeting.section.faq.q5=Can DateDate auto-create a calendar event?
seo.useCase.team-meeting.section.faq.a5=Not yet. Once the time is decided here, create the event in Google or Outlook Calendar and invite the team. DateDate handles the *coordination* phase; calendar apps handle the *invite* phase.

# ===== Use Case: travel-planning (5-section content) =====
seo.useCase.travel-planning.section.intro=A group trip starts with a casual "want to go?" but turns into a stack of dependencies the moment you try to lock departure and return dates: PTO approvals, airfare swings, exchange-rate timing, kids' school schedules. A travel-planning DateDate page collects open departure dates from a family of four, six friends, or an eight-person club on one screen, so PTO patterns line up against each other. Splitting the departure-date vote and the return-date vote into two rounds lets you see airfare trends between them.

seo.useCase.travel-planning.section.whenToUse.title=When travel-planning pages help
seo.useCase.travel-planning.section.whenToUse.lead=Travel has a high cost-of-change, so the page helps at every step from narrowing candidates to locking the trip before booking flights.
seo.useCase.travel-planning.section.whenToUse.scenario1.title=Family trips (3 to 5 people)
seo.useCase.travel-planning.section.whenToUse.scenario1.text=Family trips collide with one parent's job, the kids' school breaks, and the other parent's PTO. Get four or five candidate departure dates on the page, then optimize for the date that the most family members can clear. Only days where the parents' PTO and the kids' break overlap end up on the candidate list.
seo.useCase.travel-planning.section.whenToUse.scenario2.title=International friend or couple trips (4 to 6 people)
seo.useCase.travel-planning.section.whenToUse.scenario2.text=International airfare changes by hundreds of dollars across a one-week window. Collect open dates first, then run flight searches against just those dates. Once a flight is paid for the cost of changing the date jumps sharply, so confirm everyone *before* anyone books.
seo.useCase.travel-planning.section.whenToUse.scenario3.title=Clubs and team retreats (6 to 8 people)
seo.useCase.travel-planning.section.whenToUse.scenario3.text=An overnight team retreat or a club weekend is sensitive to drop-outs because cost is split per person. Collect departure-date candidates, but write a *minimum 6 attendees* rule into the description so everyone knows what triggers a cancellation.

seo.useCase.travel-planning.section.mistakes.title=Common travel-scheduling mistakes
seo.useCase.travel-planning.section.mistakes.lead=Travel mixes payments and PTO approvals, so changes hurt more than ordinary meetups. Break the patterns below first.
seo.useCase.travel-planning.section.mistakes.mistake1.problem=A change request after flights are booked — "can we leave a day earlier?" arrives the day after payment, and now the change fee is hundreds of dollars per person.
seo.useCase.travel-planning.section.mistakes.mistake1.fix=Collect dates on the page, set a clear deadline, and put the rule in the description: *trip is locked when flights are paid for*. Anyone requesting a change after that pays the fee themselves.
seo.useCase.travel-planning.section.mistakes.mistake2.problem=PTO approval drags, and the day before the deadline someone says they can't get the time off — collapsing everyone else's flight and hotel plans.
seo.useCase.travel-planning.section.mistakes.mistake2.fix=Once the candidate dates are narrow, set a *PTO-approval deadline* (typically six weeks before departure) and put it on the page. Members whose PTO isn't approved by then are *moved to a standby list rather than counted as confirmed* — flights and lodging get booked for the confirmed group, and standby members can rejoin if a seat opens up later.
seo.useCase.travel-planning.section.mistakes.mistake3.problem=Trying to lock departure and return on the same vote — the candidate set goes to zero and someone gets pressured into giving up PTO.
seo.useCase.travel-planning.section.mistakes.mistake3.fix=Run the departure-date vote and the trip-length vote separately. Pick the departure date first, look at airfare, then vote on length ("3-night, 4-night, 5-night") using the menu vote feature.

seo.useCase.travel-planning.section.tips.title=Tips for trip planning
seo.useCase.travel-planning.section.tips.tip1.title=Split departure and return into two rounds
seo.useCase.travel-planning.section.tips.tip1.text=Lock the departure date first, see the airfare, then run a second vote on trip length. Trying to settle both at once shrinks the candidate window so much that people drop.
seo.useCase.travel-planning.section.tips.tip2.title=Set a PTO-approval deadline
seo.useCase.travel-planning.section.tips.tip2.text=Members whose PTO isn't approved six to eight weeks before departure move to a *standby list* — confirmed members can book without waiting, and standby seats fill in as approvals come through. Without a deadline, decisions slide right up to departure week.
seo.useCase.travel-planning.section.tips.tip3.title=Agree on a budget ceiling up front
seo.useCase.travel-planning.section.tips.tip3.text=A per-person flight + lodging cap stops the search from looping. Without it, one "this hotel is too expensive" comment restarts the airfare search and the schedule slips.
seo.useCase.travel-planning.section.tips.tip4.title=Hand off to specialized tools
seo.useCase.travel-planning.section.tips.tip4.text=Once DateDate decides *when*, search flights on Google Flights or Skyscanner and lodging on Booking.com or Airbnb. Don't force everyone onto one tool. DateDate handles only the coordination step.

seo.useCase.travel-planning.section.faq.q1=Can I plan a trip with more than 8 people?
seo.useCase.travel-planning.section.faq.a1=DateDate caps a page at 8. Beyond that, color coding gets crowded and cost-splitting math gets messy. For larger groups, lock the date with a core 5 or 6 and notify the rest. The decision quality goes up as the group shrinks.
seo.useCase.travel-planning.section.faq.q2=Can we vote on the destination on the same page?
seo.useCase.travel-planning.section.faq.a2=Yes. Add destination candidates to the location vote. But run *destination first, dates second* — flight time, time zone, and high season vary by destination, which changes which dates are even viable.
seo.useCase.travel-planning.section.faq.q3=What if someone drops after we pay for flights?
seo.useCase.travel-planning.section.faq.a3=DateDate doesn't handle the financial side. Put the cost-split rule in the description (for example, "after payment, flight cost stays with the person; lodging is split among remaining attendees"). For the actual money, use Splitwise or your local bank's group-account feature.
seo.useCase.travel-planning.section.faq.q4=Should we reschedule if the exchange rate moves a lot?
seo.useCase.travel-planning.section.faq.a4=Almost never. If the rate shifts more than 5% between booking and departure, revisit the *budget cap* on the page rather than the dates — usually you adjust hotel class or skip an excursion, not move the trip.
seo.useCase.travel-planning.section.faq.q5=How do I clean up the page after the trip?
seo.useCase.travel-planning.section.faq.a5=Delete the schedule from the dashboard. If you plan to do another trip with the same group, leaving the page in place gives you the participant list for free next time.

# ===== Use Case: study-group (5-section content) =====
seo.useCase.study-group.section.intro=A study group is different from one-shot scheduling because it's *recurring*. A coding study or book club that meets every Saturday gets disrupted whenever exam season hits or a holiday lands on the regular slot. A study-group DateDate page handles both the recurring schedule and the exception sessions (make-ups, skips, location swaps) on the same page. Reuse the page each month and you also get a single place to track the curriculum, the venue, and the meal.

seo.useCase.study-group.section.whenToUse.title=When study-group pages help
seo.useCase.study-group.section.whenToUse.lead=Recurring meetings shift the question from "are you free this week?" to *which sessions you're missing*. Tracking that across months is what the page is for.
seo.useCase.study-group.section.whenToUse.scenario1.title=Coding or certification study (5 to 6 people)
seo.useCase.study-group.section.whenToUse.scenario1.text=AWS, Leetcode prep, or any cert with a fixed exam date sees session frequency rise in the D-30 to D-7 window. Keep the regular weekly slot, and add make-up candidates on the same page. Run a make-up only when at least four members can attend.
seo.useCase.study-group.section.whenToUse.scenario2.title=Book or humanities clubs (4 to 6 people)
seo.useCase.study-group.section.whenToUse.scenario2.text=A twice-monthly book club has variable cadence: a long book may push the next session to three weeks, a short one to two. Put three candidate dates for the next session on the page and pick by reading load, not calendar habit.
seo.useCase.study-group.section.whenToUse.scenario3.title=Recurring club or society meetups
seo.useCase.study-group.section.whenToUse.scenario3.text=Larger clubs often run with a 6-person core that always shows and a rotating attendance set. Lock the page to the core, and direct guests to a separate channel referenced in the description rather than adding every guest as a participant.

seo.useCase.study-group.section.mistakes.title=Common study-group mistakes
seo.useCase.study-group.section.mistakes.lead=Study groups are hard to *keep* alive. The patterns below are the early warning signs of dissolution within one or two sessions.
seo.useCase.study-group.section.mistakes.mistake1.problem=Last-second drops before exams — "need to study, can't make it tonight" lands the day before, and the planned presenter rotation falls apart.
seo.useCase.study-group.section.mistakes.mistake1.fix=Set an *absence-notice deadline* (for example, 48 hours before each session). Past the deadline, prep responsibilities don't get hot-reassigned — the absent member is expected to *catch up before the next session and share their notes or a recording* with the group.
seo.useCase.study-group.section.mistakes.mistake2.problem=Sessions that don't move forward — every meeting starts with "where did we leave off?" and the first 30 minutes vanish.
seo.useCase.study-group.section.mistakes.mistake2.fix=Put the next session's reading or problem set in the page description (for example, "chapter 3 + exercises 1-5"). Send a one-line reminder an hour before the session and you start within five minutes of meeting.
seo.useCase.study-group.section.mistakes.mistake3.problem=Different venue every week — café A, then B, then C, and one is always full so the meeting starts 30 minutes late.
seo.useCase.study-group.section.mistakes.mistake3.fix=Use the location vote to lock *one primary venue plus one backup*. Recurring sessions accumulate startup delays when the venue is renegotiated weekly. Library study rooms or a fixed café handle this best.

seo.useCase.study-group.section.tips.title=Tips for keeping study groups alive
seo.useCase.study-group.section.tips.tip1.title=Split regular and make-up slots
seo.useCase.study-group.section.tips.tip1.text=Keep the regular weekly date (for example, Saturday 14:00) on the page and add a separate make-up slot only when four or more members are available.
seo.useCase.study-group.section.tips.tip2.title=Put the curriculum in the page description
seo.useCase.study-group.section.tips.tip2.text=List the next session's chapter, exercises, and the presenter in the description. Without it, one or two members come unprepared and the session slips by a week.
seo.useCase.study-group.section.tips.tip3.title=Lock one venue
seo.useCase.study-group.section.tips.tip3.text=Recurring study sessions don't need a venue vote each time. Pick a single primary location and list a backup in the description. The cognitive load of "where again?" is the silent killer of weekly meetups.
seo.useCase.study-group.section.tips.tip4.title=Split tools by purpose
seo.useCase.study-group.section.tips.tip4.text=Use DateDate for *when*, Discord or Slack for between-session discussion and questions, and Notion or GitHub for materials. Don't try to make one tool do all three — the information scatters.

seo.useCase.study-group.section.faq.q1=Can one page run a study group indefinitely?
seo.useCase.study-group.section.faq.a1=Yes. Reuse the same page ID with new year/month entries (for example, datedate.site/coding-study/2026/02). Participants carry over so you don't have to recreate the page per semester or quarter.
seo.useCase.study-group.section.faq.q2=How do we handle a member who drops mid-semester?
seo.useCase.study-group.section.faq.a2=Leave their availability blank for upcoming sessions. Removing the member from the page also wipes their attendance history, so for inactive members keep the entry but stop adding their availability.
seo.useCase.study-group.section.faq.q3=How do we mark a session as a make-up versus a regular?
seo.useCase.study-group.section.faq.a3=DateDate doesn't have a built-in make-up flag. Use a naming convention in the schedule title ("Session 3 — regular" versus "Session 3 — make-up") and track curriculum progress in the description.
seo.useCase.study-group.section.faq.q4=Can we pause for one or two weeks during exams?
seo.useCase.study-group.section.faq.a4=Yes. Don't add a schedule for the skipped weeks. When the next session is created, the skipped weeks show as empty on the page. Member list stays intact.
seo.useCase.study-group.section.faq.q5=Can we attach study materials (PDFs, code) to the page?
seo.useCase.study-group.section.faq.a5=DateDate doesn't support file uploads. Keep materials in Notion, Google Drive, or GitHub and reference the URL in the description or as a menu-vote item. Let DateDate focus on scheduling and outsource the rest.
seo.useCase.club-activity.section.intro=A club is different from a friend meetup or a one-off plan: it's a *standing group* where members come and go. Of 15 members, only 6-10 actually show up in a given week — and it changes every time. A group-chat announcement turns into a weekly "how many are coming?", and it's hard to size courts, fields, or the after-party. A club DateDate page pools attendance per session and manages both weekly activities and quarterly outings on the same page.
seo.useCase.club-activity.section.whenToUse.title=When a club uses DateDate
seo.useCase.club-activity.section.whenToUse.lead=Running a club is less about "who is free" and more about *how many actually show up this session*. In these situations one page replaces the group-chat announcement.
seo.useCase.club-activity.section.whenToUse.scenario1.title=Weekly sports (tennis, futsal, badminton)
seo.useCase.club-activity.section.whenToUse.scenario1.text=Courts and fields are booked by headcount. Collect attendance each week and you can size the booking up front — singles courts for 4, doubles for 8. Booking by the attendance deadline cuts wasted court fees from no-shows.
seo.useCase.club-activity.section.whenToUse.scenario2.title=Quarterly outings & external events (hiking, camping, tournaments)
seo.useCase.club-activity.section.whenToUse.scenario2.text=Beyond regular activities, big events like a quarterly hike or an amateur tournament have several candidate dates. Narrow down the weekend most members can make, then settle the meeting point and transport vote in one screen.
seo.useCase.club-activity.section.whenToUse.scenario3.title=New members & season starts
seo.useCase.club-activity.section.whenToUse.scenario3.text=When a new season starts or new members join, the roster and the usual attendance days change all at once. Add members to the page, re-share the link, and you can see at a glance who tends to come on which day.
seo.useCase.club-activity.section.mistakes.title=Common mistakes running club schedules
seo.useCase.club-activity.section.mistakes.lead=Because clubs are large, a *small group of organizers* tends to carry the scheduling. These patterns are a sign the organizers will burn out and the club will fade.
seo.useCase.club-activity.section.mistakes.mistake1.problem=Collecting attendance by group chat only: "Anyone in for tennis Saturday?" gets buried under other chatter and only 3-4 reply.
seo.useCase.club-activity.section.mistakes.mistake1.fix=Use a DateDate link with a fixed attendance deadline instead (e.g., "tap by Thursday night"). Lock the court count by the deadline headcount so you aren't whipsawed by day-of changes.
seo.useCase.club-activity.section.mistakes.mistake2.problem=One organizer tallying heads every time: scrolling the chat to count who's coming burns the organizer out.
seo.useCase.club-activity.section.mistakes.mistake2.fix=Delegate the tally to the page. Members mark their own attendance and organizers just read the result. Removing the counting work also makes it easier to rotate organizers.
seo.useCase.club-activity.section.mistakes.mistake3.problem=Accumulating no-shows: people say they'll come and don't, so court fees and dues never reconcile.
seo.useCase.club-activity.section.mistakes.mistake3.fix=Make it a rule that changes after the deadline are *announced by the member in the chat*. As per-session attendance history builds up, repeat no-shows become visible and can be moved to prepaid dues.
seo.useCase.club-activity.section.tips.title=Tips to keep a club going
seo.useCase.club-activity.section.tips.tip1.title=Fix the attendance deadline
seo.useCase.club-activity.section.tips.tip1.text=A fixed day like "Thursday night = attendance deadline" lets members learn the rhythm and lifts response rates. A floating deadline means organizers nag every week.
seo.useCase.club-activity.section.tips.tip2.title=Pre-register the member list
seo.useCase.club-activity.section.tips.tip2.text=Add regular members' names line by line when you create the page, so members finish in two taps: "tap my name, tap available dates". Only add new members as they join.
seo.useCase.club-activity.section.tips.tip3.title=Separate regular activities from outings
seo.useCase.club-activity.section.tips.tip3.text=Weekly activities and quarterly outings are different. For regulars, just collect attendance; for outings, offer several candidate dates and decide by majority. Manage both by changing the month/year on one page.
seo.useCase.club-activity.section.tips.tip4.title=Vote on venue & court alongside the date
seo.useCase.club-activity.section.tips.tip4.text=Use DateDate's venue vote to settle the court, field, or after-party along with the date. For sports clubs the booking matters as much as the date — do it in one screen instead of spamming the chat twice.
seo.useCase.club-activity.section.faq.q1=We have more than 20 members — does one page work?
seo.useCase.club-activity.section.faq.a1=DateDate recommends up to 8 people per page. For a 20-person club, run the page around the *core 6-8 who actually attend each session* and just announce the confirmed date and venue to the rest in the chat. Fill the page with your frequent attendees.
seo.useCase.club-activity.section.faq.q2=Can we keep using the same page every week?
seo.useCase.club-activity.section.faq.a2=Yes. Move to the next month of the same club ID (e.g., datedate.site/tennis-club/2026/02) and the member list copies over automatically. No need to recreate the page — just change the month to continue.
seo.useCase.club-activity.section.faq.q3=How do we add new members?
seo.useCase.club-activity.section.faq.a3=Add the new member's name via Add participant and re-share the link. Within the recommended 8-person limit, swap in new members for inactive ones so the list always reflects *actual attendees*.
seo.useCase.club-activity.section.faq.q4=What if a member who said they'd come doesn't show (a no-show)?
seo.useCase.club-activity.section.faq.a4=Book the court or venue by the deadline headcount, and make it a rule that no-shows after the deadline are announced by the member in the chat. As per-session history builds, repeat no-shows surface and can be managed with prepaid dues.
seo.useCase.club-activity.section.faq.q5=If the link leaks, can strangers join?
seo.useCase.club-activity.section.faq.a5=Anyone with the link can enter a name and mark attendance. If your club isn't open-recruiting, mix a hard-to-guess string into the ID (e.g., tennis-club-k7q9). If it is open, use this to your advantage — share the link in cafes or social media to recruit new members.

# ===== Date Diff Tool Body Sections =====
tool.datediff.section.when.title=When you need a date calculator
tool.datediff.section.when.body=Counting days by hand sounds easy until you mix months of 30 and 31 days, leap years, and the question of whether the start date counts. The cases below are where this tool matters.
tool.datediff.section.when.case1=<strong>D-Day and anniversaries</strong> — wedding anniversaries, "100 days together," due dates, time until an exam.
tool.datediff.section.when.case2=<strong>Contracts and recurring payments</strong> — lease end, insurance and subscription renewals, warranty expiration. Reminders set in business days need an accurate weekday count.
tool.datediff.section.when.case3=<strong>Projects and trips</strong> — sprints remaining until launch, business days until a vacation departure.

tool.datediff.section.workdays.title=Why business-day counts differ
tool.datediff.section.workdays.body=The <em>working days only</em> option excludes Saturdays and Sundays from the range. It uses the same convention as Excel <code>NETWORKDAYS</code>: the start date is counted, the end date is not. That is why a calendar-day span can differ from a business-day span. A seven-day window that contains one weekend has five business days, but seven days starting on Saturday and ending the following Friday yield only four. The starting day of the week matters.
tool.datediff.section.workdays.note=Public holidays are not subtracted automatically. If you need a precise count, subtract local holidays yourself (for example, a US Thanksgiving Friday or a Korean Chuseok long weekend).

tool.datediff.section.faq.title=Frequently asked questions
tool.datediff.section.faq.q1=Does it include weekends?
tool.datediff.section.faq.a1=The default calculation includes Saturdays and Sundays. Toggle <em>working days only</em> to exclude weekends.
tool.datediff.section.faq.q2=Are public holidays excluded automatically?
tool.datediff.section.faq.a2=No. The tool does not have a holiday calendar. For accurate business-day counts in countries with major public holidays, subtract the holiday count from the result.
tool.datediff.section.faq.q3=Can it handle lunar calendar dates?
tool.datediff.section.faq.a3=Inputs are Gregorian dates only. Convert lunar anniversaries (for example, Korean lunar birthdays) to a Gregorian date first, then enter both ends.

tool.datediff.section.related.title=Related tools
tool.datediff.section.related.body=Once you have the date range, the tools below help with the rest of group scheduling.
tool.datediff.section.related.guideLabel=DateDate user guide
tool.datediff.section.related.guideDesc=A five-step guide for groups picking a meeting date together.
tool.datediff.section.related.useCaseLabel=Team meeting coordination
tool.datediff.section.related.useCaseDesc=Once a deadline is set, lock in the team meeting that gets you there.

