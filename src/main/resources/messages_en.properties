seo.useCase.club-activity.title=Club & Hobby Group Scheduling
seo.useCase.club-activity.description=Coordinate recurring club activities and track attendance in one place. For tennis, hiking, futsal, or board games, see who's coming to each session before you book.
seo.useCase.club-activity.body=A club isn't a one-off plan — it's a standing group where members come and go. Your roster may list 15 people, but only 6-10 actually show up each week, and it changes every time. With one DateDate link, members tap the dates they can make and attendance is tallied per session. Sports clubs (tennis, futsal, badminton) can size court bookings; outings (hiking, camping) can find the weekend that works. Settle the venue, court, and after-party in the same screen, and reuse the page each month to keep the activity going. No sign-up, no install.
