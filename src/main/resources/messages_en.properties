index.faq.title=Frequently Asked Questions
index.faq1.q=Is it free? Do I need to sign up?
index.faq1.a=Completely free, no sign-up required. Just enter an ID to create a page. Participants join via link only.
index.faq2.q=Can participants change their dates?
index.faq2.a=Yes. Select your name from the dropdown, pick your dates again, and save.
index.faq3.q=How do location and menu voting work?
index.faq3.a=Suggest and vote for locations and menus at the bottom of the schedule page. Multiple votes are allowed, and you can attach delivery app links to menus.
index.faq4.q=How long is the schedule data kept?
index.faq4.a=Data is kept until you delete it. You can check and manage everything from the dashboard at any time.
index.faq5.q=What if my page ID is already taken?
index.faq5.a=You\u2019ll be taken to that page\u2019s dashboard. Try combining numbers or hyphens for a unique ID. Example: my-team-2025
index.faq6.q=Can anyone join if the link is shared?
index.faq6.a=Yes, anyone with the link can join. Only share with people you trust.

# ===== Guide Page =====
guide.hero.title=DateDate User Guide
guide.hero.subtitle=How to coordinate a group schedule in 5 steps
guide.step1.title=Create Your Page
guide.step1.p=Visit datedate.site, enter your desired ID, and click <strong>Get Started</strong>.
guide.step1.li1=Lowercase letters, numbers, and hyphens (-) only
guide.step1.li2=Between 2 and 20 characters
guide.step1.li3=Examples: <code>my-team</code>, <code>college-friends</code>, <code>trip-2025</code>
guide.step1.tip=You can also use the Random button to generate a unique ID automatically.
guide.step2.title=Create a Schedule
guide.step2.p=Select the desired <strong>month</strong> from the dashboard, and a schedule page for that month is automatically created.
guide.step2.li1=Manage multiple months at the same time
guide.step2.li2=See all schedules at a glance from the dashboard
guide.step3.title=Share the Link
guide.step3.p=Copy the link to your schedule page and share it with participants.
guide.step3.li1=Share via KakaoTalk, Slack, email, or anywhere else
guide.step3.li2=Participants join instantly \u2014 no sign-up or app install required
guide.step3.li3=Anyone with the link can access
guide.step4.title=Pick Dates & Vote
guide.step4.p=Participants <strong>enter their name</strong> and <strong>click available dates</strong> on the calendar.
guide.step4.li1=Up to 8 participants
guide.step4.li2=Each participant gets a unique color for easy visualization
guide.step4.li3=Easy to edit \u2014 select your name from the dropdown and reselect dates
guide.step4.li4=You can also suggest and vote on locations and menus
guide.step5.title=Review Results & Decide
guide.step5.p=The date with the most availability is <strong>highlighted automatically</strong>.
guide.step5.li1=Dates with more overlap appear in darker colors
guide.step5.li2=See popular location and menu rankings too
guide.step5.li3=Finalize your date, location, and menu
