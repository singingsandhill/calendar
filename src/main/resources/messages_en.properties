seo.useCase.team-meeting.title=Team Meeting Coordination
seo.useCase.team-meeting.description=Efficiently schedule meetings with busy teammates. Coordinate kickoffs, check-ins, and review sessions without sign-ups.
seo.useCase.team-meeting.body=Project kickoffs, sprint reviews, recurring syncs — aligning busy teammates is never easy. DateDate needs no sign-up or login: just share a link and your team picks available dates right away. Up to 8 participants can join, each with a unique color so you can see who's free when at a glance. Share via Slack, email, KakaoTalk, or any channel you like — DateDate doesn't lock you into one communication tool.
