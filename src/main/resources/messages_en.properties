faq.hero.title=Frequently Asked Questions
faq.hero.subtitle=Answers to the most common questions about using DateDate.
faq.list.heading=Questions
faq.q1=Is DateDate free?
faq.a1=Completely free. No sign-up, no install, no payment required. Just enter a URL and start.
faq.q2=How many people can participate?
faq.a2=Up to 8 participants per schedule. Each participant is shown in a unique color so you can see at a glance who is available when.
faq.q3=What should participants do after receiving the link?
faq.a3=Opening the link goes directly to the schedule page. Select or add your name, click available dates on the calendar, and save. No sign-up or app install needed.
faq.q4=How do I fix a wrong date selection?
faq.a4=Select your name in the dropdown to see your previous selections. Click a date again to toggle it. You can edit anytime before hitting Save.
faq.q5=Can I use it on mobile?
faq.a5=Yes, it works on smartphones, tablets, and PCs. No app install needed — just use your browser.
faq.q6=How do location and menu voting work?
faq.a6=At the bottom of the schedule page, you can suggest and vote for locations and menus. Select your name first, then click the vote button.
faq.q7=How long is data retained?
faq.a7=Schedule data is stored on our servers. You can delete schedules directly from the dashboard.
faq.q8=I forgot my URL (page ID).
faq.a8=Check the previously shared link, or enter the same ID again on the home page to go back to your dashboard. Your data will still be there if you know the ID.
