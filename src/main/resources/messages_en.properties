seo.useCase.friend-meetup.body=Stop the endless "When are you free?" in your group chat. With one DateDate link, your friends' availability is visible at a glance. Whether it's a reunion, regular hangout, birthday party, or spontaneous meetup, share the link and each friend picks their available dates. The day that works for the most friends is highlighted automatically. You can even vote on the venue and menu to answer "Where should we meet?" and "What should we eat?" — all in one page. No sign-up, no app install. Start in seconds.
