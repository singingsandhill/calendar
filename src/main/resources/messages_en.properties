seo.faq.ogTitle=FAQ | DateDate
seo.faq.ogDescription=Answers to common questions about using DateDate — pricing, how to join, and more.
seo.faq.q1=Is DateDate free?
seo.faq.a1=Completely free. No sign-up, no install, no payment required. Just enter a URL and start.
seo.faq.q2=How many people can participate?
seo.faq.a2=Up to 8 participants per schedule. Each participant gets a unique color so you can see at a glance who is available when.
seo.faq.q3=What should participants do after receiving the link?
seo.faq.a3=Opening the link goes directly to the schedule page. Select or add your name, click available dates on the calendar, and save. No sign-up or app install needed.
seo.faq.q4=How long is data retained?
seo.faq.a4=Schedule data is stored on our servers. You can delete schedules directly from the dashboard.
seo.faq.q5=Can I use it on mobile?
seo.faq.a5=Yes, it works on smartphones, tablets, and PCs. No app install needed — just use your browser.
seo.faq.q6=How do location and menu voting work?
seo.faq.a6=At the bottom of the schedule page, you can suggest and vote for locations and menus. Select your name first, then click the vote button.

