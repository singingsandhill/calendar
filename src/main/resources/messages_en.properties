# ===== Guide: Troubleshooting =====
guide.troubleshooting.title=Troubleshooting common issues
guide.troubleshooting.q1=I shared the link but a participant can't vote
guide.troubleshooting.a1=Make sure you shared the monthly schedule link (datedate.site/your-id/2026/7), not the dashboard link (datedate.site/your-id). The "Copy Link" button on each schedule card copies the right one. Participants need to enter their name, click the dates that work, and press Save.
guide.troubleshooting.q2=The page ID I want is already taken
guide.troubleshooting.a2=Page IDs are first come, first served. They can be 2-20 characters using lowercase letters, numbers, and hyphens (-), so try a variation like my-team-2026. A few reserved words that overlap with service pages can't be used.
guide.troubleshooting.q3=What if we have more than 8 people?
guide.troubleshooting.a3=Each schedule supports up to 8 participants. For larger groups, split into subgroup pages (team-a, team-b) or coordinate across several monthly schedules under the same ID.
guide.troubleshooting.q4=How do I edit or delete a schedule?
guide.troubleshooting.a4=Open the schedule with "View" on its dashboard card, then pick your name from the dropdown to re-select your dates. To remove a schedule entirely, press "Delete" on the card. Deletion takes effect immediately and cannot be undone.
guide.troubleshooting.q5=How long is my data kept?
guide.troubleshooting.a5=Schedule data is kept until you delete it. You can remove schedules you no longer need from your dashboard at any time. See the privacy policy for details.
guide.troubleshooting.q6=The link opens a different month
guide.troubleshooting.a6=Schedules on DateDate are created per month. Check that the year/month in the shared link (datedate.site/your-id/2026/7) matches the month you're planning. The "This Month" button on the dashboard jumps straight to the current month.

