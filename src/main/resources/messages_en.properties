# Home editorial section (why/how/limits) — index.html why-section
index.why.title=Why use DateDate instead of a group chat
index.why.lead=Coordinating group plans is hard not because you lack a tool, but because a group chat is the wrong tool for it.
index.why.problem.title=The endless "what day works?"
index.why.problem.desc=Drop "what day this weekend?" into a group chat and the answers scatter. One says "Saturday afternoon", another "Sunday only", another replies days later. The organizer scrolls to gather replies, works out the overlap by hand, and starts over the moment someone changes their plan. Past five people, this drags on for days.
index.why.how.title=How DateDate works
index.why.how.desc=DateDate moves that onto one screen. Create a page, share the link, and participants pick their name (no sign-up) and tap the days they can make on the calendar. Everyone's choices stack as color intensity, so the day the most people can attend surfaces automatically. Settle the venue and menu by vote on the same page, and the plan is done.
index.why.limits.title=Honest limitations
index.why.limits.desc=DateDate doesn't try to do everything. It collects availability by *day*, not by time of day (no morning/afternoon split), and recommends up to 8 people per page. There are no accounts or passwords, so anyone with the link can join — use a hard-to-guess ID if you need privacy. For reminders and venue directions, Google or Apple Calendar is stronger, so use DateDate to *decide* the date and move the result into your calendar.

