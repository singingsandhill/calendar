seo.useCase.friend-meetup.title=Friend Meetup Scheduling
seo.useCase.friend-meetup.description=Easily schedule friend meetups. Coordinate reunions, regular hangouts, and birthday parties with multiple friends in one link.
seo.useCase.friend-meetup.body=Stop the endless "When are you free?" in your group chat. With one DateDate link, your friends'' availability is visible at a glance. Whether it''s a reunion, regular hangout, birthday party, or spontaneous meetup, share the link and each friend picks their available dates. The day that works for the most friends is highlighted automatically. You can even vote on the venue and menu to answer "Where should we meet?" and "What should we eat?" — all in one page. No sign-up, no app install. Start in seconds.
seo.useCase.friend-meetup.exampleLabel=Reunion
seo.useCase.friend-meetup.exampleId=college-friends
seo.useCase.friend-meetup.step1.name=Create a DateDate page
seo.useCase.friend-meetup.step1.text=Go to datedate.site, enter a group ID (e.g., college-friends), and click Get Started.
seo.useCase.friend-meetup.step2.name=Share the link with friends
seo.useCase.friend-meetup.step2.text=Share the generated page link via KakaoTalk, SMS, or any messenger. Friends can join instantly — no install or sign-up needed.
seo.useCase.friend-meetup.step3.name=See when everyone is available
seo.useCase.friend-meetup.step3.text=When friends enter their names and click available dates, the day with the most overlaps is highlighted automatically.

seo.useCase.team-meeting.title=Team Meeting Coordination
seo.useCase.team-meeting.description=Efficiently schedule meetings with busy teammates. Coordinate kickoffs, check-ins, and review sessions without sign-ups.
seo.useCase.team-meeting.body=Project kickoffs, sprint reviews, recurring syncs — aligning busy teammates is never easy. DateDate needs no sign-up or login: just share a link and your team picks available dates right away. Up to 8 participants can join, each with a unique color so you can see who''s free when at a glance. Share via Slack, email, KakaoTalk, or any channel you like — DateDate doesn''t lock you into one communication tool.
seo.useCase.team-meeting.exampleLabel=Marketing team weekly sync
seo.useCase.team-meeting.exampleId=marketing-team
seo.useCase.team-meeting.step1.name=Create a team schedule page
seo.useCase.team-meeting.step1.text=Go to datedate.site, enter a team ID (e.g., dev-team), and click Get Started.
seo.useCase.team-meeting.step2.name=Share the link with teammates
seo.useCase.team-meeting.step2.text=Share the generated link via Slack, email, or your team''s work channel. Teammates join without any sign-up.
seo.useCase.team-meeting.step3.name=Pick the best meeting date
seo.useCase.team-meeting.step3.text=When teammates select available dates, common dates are highlighted automatically. You can also vote on meeting rooms and venues.

seo.useCase.travel-planning.title=Travel Planning
seo.useCase.travel-planning.description=Easily sync travel dates with family or friends. Pool everyone''s vacation schedule in one place to find overlapping days.
seo.useCase.travel-planning.body=Want to travel but can''t agree on dates? Use DateDate to gather your travel group''s availability in one spot. When each member clicks their available dates on the calendar, the day with the most overlap appears instantly. Family trips, overseas travel, domestic getaways, workshops — it works for any trip. Use the destination voting feature to decide "Where should we go?" and attach restaurant or attraction links to the menu so you can manage the whole trip plan on a single page.
seo.useCase.travel-planning.exampleLabel=Japan trip plan
seo.useCase.travel-planning.exampleId=japan-trip-2025
seo.useCase.travel-planning.step1.name=Create a trip schedule page
seo.useCase.travel-planning.step1.text=Go to datedate.site, enter a trip ID (e.g., trip-2025), and click Get Started.
seo.useCase.travel-planning.step2.name=Share the link with travel companions
seo.useCase.travel-planning.step2.text=Share the generated link with your travel group. Anyone can join instantly — no sign-up needed.
seo.useCase.travel-planning.step3.name=Lock in a date that works for everyone
seo.useCase.travel-planning.step3.text=When members pick their available dates, the best travel day is highlighted. You can also vote on destinations and restaurants.

seo.useCase.study-group.title=Study Group Scheduling
seo.useCase.study-group.description=Easily schedule study groups, book clubs, and recurring meetups. Pool everyone''s availability to pick regular dates.
seo.useCase.study-group.body=Setting a regular date for a study group is harder than it sounds. With DateDate, members pick their available dates and you quickly find the day the most people can attend. Coding study, book clubs, language study, certification prep, college clubs — it works for any group. You can also vote on venues (cafe vs. study room vs. library) all in one step. Create a new schedule each month to make it a recurring habit.
