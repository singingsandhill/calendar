# ===== About Page Body =====
about.hero.title=About DateDate
about.hero.subtitle=A no-signup tool for groups to agree on a date, place, and meal
about.updated=Last updated: May 10, 2026

about.section.intro.title=What DateDate is
about.section.intro.body=DateDate is a small web tool that replaces the back-and-forth of "when works for everyone?" in group chats with one shared link. The organizer picks a page ID such as college-friends or marketing-team, which becomes datedate.site/{ID}. Each person opens the link, types their name, and clicks the dates they are free. Overlapping availability shows up automatically, and the group can also vote on a location and a meal in the same place. There is no sign-up, no app install, and no payment — it works in any modern mobile or desktop browser.

about.section.principles.title=How we run the service
about.section.principles.body=DateDate is designed to remove friction, not add it. The operating principles below shape every decision we make.
about.section.principles.list1=<strong>No accounts</strong> — We do not collect emails, phone numbers, or names directly. The page ID and participant names are values you choose and type in.
about.section.principles.list2=<strong>Free for everyone</strong> — Creating schedules, joining, and voting are all free. We cover hosting costs with ads on content pages only.
about.section.principles.list3=<strong>Minimal data retention</strong> — Schedules, participants, and votes stay until you delete them from the dashboard. We use Google Analytics for aggregate stats, and nothing else.
about.section.principles.list4=<strong>Public-link model by design</strong> — Anyone with the link can join. If you need a non-public schedule, choose a hard-to-guess ID (random letters and numbers).

about.section.audience.title=Who finds it useful
about.section.audience.body=DateDate is best for groups of up to eight people who need to agree on a single date. Common use cases include:
about.section.audience.case1=<strong>Friend meetups</strong> — Reunions, recurring dinners, last-minute drinks. Cuts the long thread of "what about Saturday?" messages.
about.section.audience.case2=<strong>Team meetings</strong> — Quarterly planning, sprint reviews, or coordinating across time zones for distributed teams.
about.section.audience.case3=<strong>Trips and events</strong> — Family trips, weekend getaways, wedding pre-meetings, anywhere multiple people need to align PTO.
about.section.audience.case4=<strong>Study and clubs</strong> — Reading groups, exam prep, weekly meetups with occasional makeup sessions.

about.section.contact.title=Contact and feedback
about.section.contact.body=Bug reports, feature requests, and feedback of any kind are welcome. The form below reaches us directly. We read submissions on business days and reply within three business days when a reply is needed.
about.section.contact.formLabel=Send feedback
about.section.contact.note=We read messages in Korean or English. See our privacy policy for data handling, and the terms of service for usage conditions.
about.section.contact.privacyLink=Privacy policy
about.section.contact.termsLink=Terms of service

