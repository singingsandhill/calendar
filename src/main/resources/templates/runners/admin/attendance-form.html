<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" th:with="extraStylesheets=${ {'/css/runners.css'} }">
<head th:replace="~{fragments/head :: head(${seo})}"></head>
<body class="runners-body">
    <nav class="runners-navbar">
        <div class="runners-navbar-content">
            <a th:href="@{/runners}" class="runners-logo">
                <img th:src="@{/image/crew_logo.png}" alt="Running Crew Logo" onerror="this.style.display='none'">
                <span class="runners-logo-text">Running Crew</span>
            </a>
            <div class="runners-nav">
                <a th:href="@{/runners/admin}">← 대시보드</a>
            </div>
        </div>
    </nav>

    <main class="runners-container">
        <div class="runners-login-card" style="max-width: 500px; margin: 2rem auto;">
            <h1>출석 수정</h1>

            <div style="background: var(--runners-bg-secondary, #f5f5f5); padding: 0.75rem 1rem;
                        border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--runners-text-secondary, #666);">
                <span th:text="${run.formattedDate()}">날짜</span>
                <span> &middot; </span>
                <span th:text="${run.categoryDisplayName()}">유형</span>
                <span> &middot; </span>
                <span th:text="${run.location()}">장소</span>
            </div>

            <div th:if="${errors}" class="runners-message runners-message-error">
                <ul style="margin: 0; padding-left: 1.25rem;">
                    <li th:each="error : ${errors}" th:text="${error.defaultMessage}">에러 메시지</li>
                </ul>
            </div>

            <form th:action="@{/runners/admin/attendance/{id}(id=${attendance.id()})}" method="post">

                <div class="runners-form-group">
                    <label for="participantName">이름</label>
                    <input type="text" id="participantName" name="participantName"
                           class="runners-input" required maxlength="50"
                           th:value="${attendance.participantName()}">
                </div>

                <div class="runners-form-group">
                    <label for="distance">달린 거리 (km)</label>
                    <input type="number" id="distance" name="distance"
                           class="runners-input" required
                           min="0.1" max="100" step="0.1"
                           th:value="${attendance.distance()}">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a th:href="@{/runners/runs/{runId}(runId=${attendance.runId()})}"
                       class="runners-btn runners-btn-secondary" style="flex: 1; text-align: center;">
                        취소
                    </a>
                    <button type="submit" class="runners-btn runners-btn-primary" style="flex: 1;">
                        수정하기
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{runners/fragments/footer :: footer}"></footer>
</body>
</html>
