<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(${seo})}"></head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PFPKQT7W"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<div th:replace="~{fragments/header :: [th:fragment='header']}"></div>

<main class="container" id="main-content">
    <div class="schedule-header">
        <p class="owner-info" th:text="#{schedule.owner.info(${ownerId})}">user님의 일정</p>
        <h1 th:text="${yearMonthLabel}">2025년 12월</h1>
        <p class="subtitle" th:text="#{schedule.subtitle}">참여 가능한 날짜를 선택하세요</p>
        <div class="schedule-header-actions">
            <button class="btn btn-outline copy-link-btn" data-action="link.copy" th:text="#{schedule.copy.link}">링크 복사</button>
            <!-- 배너가 열려있을 땐 X 버튼이 닫기 역할이므로 토글 버튼은 숨김.
                 배너가 닫혀있을 때 JS가 hidden 속성을 제거해 노출.
                 noscript 케이스: 참여자 없으면 배너 자동 노출이라 토글 숨김. -->
            <button type="button"
                    class="btn btn-outline btn-help-toggle"
                    id="onboardingHelpToggle"
                    data-action="onboarding.show"
                    aria-controls="onboardingBanner"
                    aria-expanded="false"
                    th:hidden="${schedule.participants().isEmpty()}"
                    th:text="#{schedule.help.show}">도움말 보기</button>
        </div>
    </div>

    <!-- 온보딩 배너: 첫 방문(참여자 없음)에 자동 표시. 닫으면 localStorage에 저장되어
         다음 방문에도 닫힌 상태 유지. 우상단 "도움말 보기" 버튼으로 다시 열 수 있음.
         noscript 케이스: 참여자 있으면 hidden 으로 막아 기존 동작 유지. -->
    <div class="onboarding-banner"
         id="onboardingBanner"
         role="note"
         aria-label="사용 안내"
         th:hidden="${!schedule.participants().isEmpty()}"
         th:attr="data-default-open=${schedule.participants().isEmpty()}">
        <div class="onboarding-steps">
            <span class="onboarding-step">
                <span class="onboarding-step-num" aria-hidden="true">1</span>
                <span th:text="#{schedule.onboarding.step1}">이름 선택 또는 추가</span>
            </span>
            <span class="onboarding-step-arrow" aria-hidden="true">→</span>
            <span class="onboarding-step">
                <span class="onboarding-step-num" aria-hidden="true">2</span>
                <span th:text="#{schedule.onboarding.step2}">날짜 클릭으로 표시</span>
            </span>
            <span class="onboarding-step-arrow" aria-hidden="true">→</span>
            <span class="onboarding-step">
                <span class="onboarding-step-num" aria-hidden="true">3</span>
                <span th:text="#{schedule.onboarding.step3}">저장하기</span>
            </span>
        </div>
        <button data-action="onboarding.dismiss"
                class="btn-close-banner"
                th:aria-label="#{schedule.onboarding.close}">×</button>
    </div>

    <div class="participant-section">
        <div class="participant-selector">
            <label for="participantSelect" th:text="#{schedule.participant.label}">이름 선택:</label>
            <select id="participantSelect">
                <option value="" th:text="#{schedule.participant.placeholder}">-- 이름 선택 --</option>
                <option th:each="p : ${schedule.participants()}"
                        th:value="${p.id()}"
                        th:text="${p.name()}"
                        th:data-color="${p.color()}">Participant</option>
            </select>
            <button class="btn btn-outline btn-sm" data-action="participant.openModal" th:text="#{schedule.participant.add}">+ 추가</button>
        </div>

        <div class="participant-legend">
            <span class="legend-item" th:each="p : ${schedule.participants()}">
                <span class="color-dot" th:style="'background-color: ' + ${p.color()}"></span>
                <span th:text="${p.name()}">Name</span>
            </span>
        </div>
    </div>

    <div class="calendar-container">
        <div class="calendar">
            <div class="calendar-header">
                <div class="weekday" th:text="#{weekday.sun}">일</div>
                <div class="weekday" th:text="#{weekday.mon}">월</div>
                <div class="weekday" th:text="#{weekday.tue}">화</div>
                <div class="weekday" th:text="#{weekday.wed}">수</div>
                <div class="weekday" th:text="#{weekday.thu}">목</div>
                <div class="weekday" th:text="#{weekday.fri}">금</div>
                <div class="weekday" th:text="#{weekday.sat}">토</div>
            </div>
            <div class="calendar-body" id="calendarBody">
                <!-- Calendar days will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-secondary" data-action="selections.reset" th:text="#{schedule.reset}">초기화</button>
        <button class="btn btn-primary" data-action="selections.save" th:text="#{schedule.save}">저장</button>
    </div>

    <!-- Location Voting Section -->
    <div class="location-section">
        <h3 th:text="#{schedule.location.title}">장소 투표</h3>
        <div class="location-add">
            <input type="text" id="locationInput" th:placeholder="#{schedule.location.placeholder}" maxlength="100">
            <button class="btn btn-outline btn-sm" data-action="location.add" th:text="#{schedule.location.add}">추가</button>
        </div>
        <div class="location-list" id="locationList">
            <div class="location-item" th:each="loc : ${schedule.locations()}">
                <div class="location-info">
                    <span class="location-name" th:text="${loc.name()}">장소명</span>
                    <span class="location-votes" th:text="#{schedule.votes(${loc.voteCount()})}">0표</span>
                </div>
                <div class="location-voters">
                    <span class="voter-tag" th:each="voter : ${loc.voters()}" th:text="${voter}">투표자</span>
                </div>
                <div class="location-actions">
                    <button class="btn btn-sm btn-primary vote-btn"
                            data-action="location.vote"
                            th:data-location-id="${loc.id()}"
                            th:text="#{schedule.location.vote}">투표</button>
                </div>
            </div>
            <p th:if="${schedule.locations().isEmpty()}" class="empty-locations" th:text="#{schedule.location.empty}">아직 제안된 장소가 없습니다.</p>
        </div>
    </div>

    <!-- Menu Voting Section -->
    <div class="location-section">
        <h3 th:text="#{schedule.menu.title}">메뉴 투표</h3>
        <div class="location-add">
            <input type="text" id="menuInput" th:placeholder="#{schedule.menu.placeholder}" maxlength="100">
            <input type="url" id="menuUrlInput" th:placeholder="#{schedule.menu.url.placeholder}" maxlength="500">
            <button class="btn btn-outline btn-sm" data-action="menu.add" th:text="#{schedule.menu.add}">추가</button>
        </div>
        <div class="location-list" id="menuList">
            <div class="location-item" th:each="menu : ${schedule.menus()}">
                <div class="location-info">
                    <span class="location-name" th:text="${menu.name()}">메뉴명</span>
                    <a th:if="${menu.url() != null and !menu.url().isEmpty()}"
                       th:href="${menu.url()}"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="menu-link">🔗</a>
                    <span class="location-votes" th:text="#{schedule.votes(${menu.voteCount()})}">0표</span>
                </div>
                <div class="location-voters">
                    <span class="voter-tag" th:each="voter : ${menu.voters()}" th:text="${voter}">투표자</span>
                </div>
                <div class="location-actions">
                    <button class="btn btn-sm btn-primary menu-vote-btn"
                            data-action="menu.vote"
                            th:data-menu-id="${menu.id()}"
                            th:text="#{schedule.menu.vote}">투표</button>
                </div>
            </div>
            <p th:if="${schedule.menus().isEmpty()}" class="empty-locations" th:text="#{schedule.menu.empty}">아직 제안된 메뉴가 없습니다.</p>
        </div>
    </div>
</main>

<!-- Add Participant Modal -->
<div id="addParticipantModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="addParticipantModalTitle">
    <div class="modal-content modal-sm">
        <div class="modal-header">
            <h2 id="addParticipantModalTitle" th:text="#{schedule.modal.title}">참여자 추가</h2>
            <button class="modal-close" data-action="participant.closeModal">&times;</button>
        </div>
        <div class="modal-body">
            <form id="addParticipantForm">
                <div class="form-group">
                    <label for="participantName" th:text="#{schedule.participant.name}">이름</label>
                    <input type="text" id="participantName" name="name"
                           maxlength="10" required
                           th:placeholder="#{schedule.participant.name.placeholder}">
                </div>
                <p class="participant-count-info" th:text="#{schedule.participant.count(${schedule.participants().size()})}">
                    0 / 8명
                </p>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" data-action="participant.closeModal" th:text="#{schedule.participant.cancel}">취소</button>
                    <button type="submit" class="btn btn-primary"
                            th:disabled="${schedule.participants().size() >= 8}"
                            th:text="#{schedule.participant.add.btn}">추가</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Create Schedule Modal (헤더 CTA 용) -->
<div th:replace="~{fragments/create-schedule-modal :: modal}"></div>

<div th:replace="~{fragments/footer :: [th:fragment='footer']}"></div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
<script defer th:src="@{/js/create-schedule-modal.js}"></script>
<script defer th:src="@{/js/analytics.js}"></script>

<!-- Schedule data injection for external script -->
<script th:inline="javascript">
    window.SCHEDULE_DATA = {
        scheduleId: [[${schedule.id()}]],
        ownerId: [[${ownerId}]],
        year: [[${schedule.year()}]],
        month: [[${schedule.month()}]],
        daysInMonth: [[${schedule.daysInMonth()}]],
        firstDayOfWeek: [[${schedule.firstDayOfWeek()}]],
        totalDays: [[${schedule.totalDays()}]],
        isExtendedMode: [[${schedule.isExtendedMode()}]],
        participants: [
            [# th:each="p, stat : ${schedule.participants()}"]
            {
                id: [[${p.id()}]],
                name: [[${p.name()}]],
                color: [[${p.color()}]],
                selections: [[${p.selections()}]]
            }[# th:unless="${stat.last}"],[/]
            [/]
        ],
        locations: [
            [# th:each="loc, stat : ${schedule.locations()}"]
            {
                id: [[${loc.id()}]],
                name: [[${loc.name()}]],
                voters: [[${loc.voters()}]],
                voteCount: [[${loc.voteCount()}]]
            }[# th:unless="${stat.last}"],[/]
            [/]
        ],
        menus: [
            [# th:each="menu, stat : ${schedule.menus()}"]
            {
                id: [[${menu.id()}]],
                name: [[${menu.name()}]],
                url: [[${menu.url()}]],
                voters: [[${menu.voters()}]],
                voteCount: [[${menu.voteCount()}]]
            }[# th:unless="${stat.last}"],[/]
            [/]
        ],
        messages: {
            selectName: [[#{schedule.alert.selectName}]],
            locationRequired: [[#{schedule.alert.locationRequired}]],
            menuRequired: [[#{schedule.alert.menuRequired}]],
            saveSuccess: [[#{schedule.save.success}]],
            linkCopied: [[#{schedule.link.copied}]],
            linkCopyPrompt: [[#{schedule.link.copyPrompt}]],
            voteLabel: [[#{schedule.location.vote}]],
            votesTemplate: [[#{schedule.votes('{0}')}]]
        }
    };
</script>
<script th:inline="javascript">
    (function () {
        var ownerId = /*[[${ownerId}]]*/ '';
        var scheduleId = /*[[${schedule.id()}]]*/ 0;
        var participantCount = /*[[${schedule.participants().size()}]]*/ 0;
        var fire = function () {
            var isOwner = !!(window.DDAnalytics && window.DDAnalytics.isOwnedSchedule(ownerId));
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                event: 'schedule_viewed',
                schedule_id: scheduleId,
                is_owner: isOwner,
                participant_count: participantCount
            });
        };
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fire);
        } else {
            fire();
        }
    })();
</script>
<script type="module" th:src="@{/js/schedule/main.js}"></script>
</body>
</html>
