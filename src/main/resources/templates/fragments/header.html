<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:lang="${#locale.language}">

<!--
  Navbar fragments — 기본/미니멀 네비게이션 바.
  <head> 내용은 fragments/head.html 을 사용하세요.
  사용법:
    <div th:replace="~{fragments/header :: [th:fragment='header']}"></div>
    <div th:replace="~{fragments/header :: [th:fragment='header-minimal']}"></div>
-->

<!-- Default Header Fragment -->
<th:block th:fragment="header">
    <header>
        <nav class="navbar" role="navigation" th:attr="aria-label=#{nav.aria.menu}">
            <div class="navbar-content">
                <a th:href="${@localeLinks.href('/')}" class="logo">DateDate</a>

                <!-- Hamburger Button (Mobile) -->
                <button class="navbar-toggle" id="navbarToggle"
                        th:attr="aria-label=#{nav.aria.open}"
                        aria-expanded="false" aria-controls="navMenu">
                    <span class="hamburger-line" aria-hidden="true"></span>
                    <span class="hamburger-line" aria-hidden="true"></span>
                    <span class="hamburger-line" aria-hidden="true"></span>
                </button>

                <!-- Navigation Menu -->
                <div class="nav-menu" id="navMenu">
                    <a th:href="${@localeLinks.href('/')}" class="nav-link" th:text="#{nav.home}">홈</a>
                    <a th:href="${@localeLinks.href('/#start-form')}" data-create-cta class="nav-link" th:text="#{nav.create}">일정 만들기</a>
                    <a th:href="${@localeLinks.href('/guide')}" class="nav-link" th:text="#{nav.guide}">가이드</a>
                    <a th:href="${@localeLinks.href('/insights/trends')}" class="nav-link" th:text="#{nav.insights}">인사이트</a>
                    <a th:href="${@localeLinks.href('/tools/date-diff')}" class="nav-link" th:text="#{nav.dateDiff}">날짜 계산기</a>
                    <!-- Auth (카카오 로그인 / 프로필) -->
                    <a sec:authorize="!hasRole('USER')" th:href="@{/oauth2/authorization/kakao}"
                       class="nav-link nav-kakao-login" th:text="#{nav.login.kakao}">카카오 로그인</a>
                    <th:block sec:authorize="hasRole('USER')">
                        <a th:href="@{/me}" class="nav-link nav-profile">
                            <img th:if="${#authentication.principal.attributes['appProfileImage'] != null}"
                                 th:src="${#authentication.principal.attributes['appProfileImage']}"
                                 class="nav-profile-img" alt="" width="24" height="24"/>
                            <span th:text="${#authentication.principal.attributes['appNickname']}">닉네임</span>
                        </a>
                        <a th:href="@{/recap}" class="nav-link" th:text="#{nav.recap}">나의 리캡</a>
                        <form th:action="@{/logout}" method="post" class="nav-logout-form">
                            <button type="submit" class="nav-link nav-logout-btn" th:text="#{nav.logout}">로그아웃</button>
                        </form>
                    </th:block>
                    <!-- Language Toggle -->
                    <div class="lang-toggle" role="group" aria-label="Language">
                        <a th:href="@{''(lang='ko')}" class="lang-btn"
                           th:classappend="${#locale.language == 'ko'} ? ' active' : ''"
                           rel="nofollow"
                           aria-label="한국어">KO</a>
                        <span class="lang-divider" aria-hidden="true">|</span>
                        <a th:href="@{''(lang='en')}" class="lang-btn"
                           th:classappend="${#locale.language == 'en'} ? ' active' : ''"
                           rel="alternate"
                           hreflang="en"
                           aria-label="English">EN</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</th:block>

<!-- Minimal Header Fragment (Garriock Style) -->
<th:block th:fragment="header-minimal">
    <header>
        <nav class="navbar-minimal" id="navbarMinimal" role="navigation" th:attr="aria-label=#{nav.aria.menu}">
            <div class="navbar-content">
                <a th:href="${@localeLinks.href('/')}" class="logo logo-serif">DateDate</a>

                <!-- Hamburger Button (Mobile) -->
                <button class="navbar-toggle" id="navbarToggle"
                        th:attr="aria-label=#{nav.aria.open}"
                        aria-expanded="false" aria-controls="navMenu">
                    <span class="hamburger-line" aria-hidden="true"></span>
                    <span class="hamburger-line" aria-hidden="true"></span>
                    <span class="hamburger-line" aria-hidden="true"></span>
                </button>

                <!-- Navigation Menu -->
                <div class="nav-menu" id="navMenu">
                    <a th:href="${@localeLinks.href('/')}" class="nav-link-animated" th:text="#{nav.home}">홈</a>
                    <a th:href="${@localeLinks.href('/#start-form')}" data-create-cta class="nav-link-animated" th:text="#{nav.create}">일정 만들기</a>
                    <a th:href="${@localeLinks.href('/guide')}" class="nav-link-animated" th:text="#{nav.guide}">가이드</a>
                    <a th:href="${@localeLinks.href('/insights/trends')}" class="nav-link-animated" th:text="#{nav.insights}">인사이트</a>
                    <a th:href="${@localeLinks.href('/tools/date-diff')}" class="nav-link-animated" th:text="#{nav.dateDiff}">날짜 계산기</a>
                    <!-- Auth (카카오 로그인 / 프로필) -->
                    <a sec:authorize="!hasRole('USER')" th:href="@{/oauth2/authorization/kakao}"
                       class="nav-link-animated nav-kakao-login" th:text="#{nav.login.kakao}">카카오 로그인</a>
                    <th:block sec:authorize="hasRole('USER')">
                        <a th:href="@{/me}" class="nav-link-animated nav-profile">
                            <img th:if="${#authentication.principal.attributes['appProfileImage'] != null}"
                                 th:src="${#authentication.principal.attributes['appProfileImage']}"
                                 class="nav-profile-img" alt="" width="24" height="24"/>
                            <span th:text="${#authentication.principal.attributes['appNickname']}">닉네임</span>
                        </a>
                        <a th:href="@{/recap}" class="nav-link-animated" th:text="#{nav.recap}">나의 리캡</a>
                        <form th:action="@{/logout}" method="post" class="nav-logout-form">
                            <button type="submit" class="nav-link-animated nav-logout-btn" th:text="#{nav.logout}">로그아웃</button>
                        </form>
                    </th:block>
                    <!-- Language Toggle -->
                    <div class="lang-toggle" role="group" aria-label="Language">
                        <a th:href="@{''(lang='ko')}" class="lang-btn"
                           th:classappend="${#locale.language == 'ko'} ? ' active' : ''"
                           rel="nofollow"
                           aria-label="한국어">KO</a>
                        <span class="lang-divider" aria-hidden="true">|</span>
                        <a th:href="@{''(lang='en')}" class="lang-btn"
                           th:classappend="${#locale.language == 'en'} ? ' active' : ''"
                           rel="alternate"
                           hreflang="en"
                           aria-label="English">EN</a>
                    </div>
                </div>
            </div>
        </nav>
        <!-- Overlay for mobile menu -->
        <div class="nav-overlay" id="navOverlay"></div>
    </header>
</th:block>

</html>
