<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">

<!--
  head(seo) fragment — 모든 페이지의 <head> 내용을 담당.
  사용법: <head th:replace="~{fragments/head :: head(${seo})}"></head>
-->
<head th:fragment="head(seo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title th:text="${seo.title()}">DateDate - 약속 잡기</title>

    <!-- Basic Meta Tags -->
    <meta name="description" th:content="${seo.description()}">
    <meta name="keywords" th:content="${seo.keywords()}">
    <meta name="author" content="DateDate">
    <meta name="language" th:content="${#locale.toLanguageTag()}">
    <meta http-equiv="content-language" th:content="${#locale.toLanguageTag()}">

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="YVK_KclWiLH24rqy7kAI9iNYSA5No9ljXbnSOvsQB4k" />

    <!-- Naver Site Verification (한국 시장 색인용 — searchadvisor.naver.com 에서 발급) -->
    <meta th:if="${@environment.getProperty('seo.naver-site-verification', '') != ''}"
          name="naver-site-verification"
          th:content="${@environment.getProperty('seo.naver-site-verification')}" />

    <!-- Robots -->
    <meta name="robots" th:content="${seo.robots()}">

    <!-- Canonical URL -->
    <link rel="canonical" th:href="${seo.canonical()}">

    <!-- hreflang (indexable public pages only) -->
    <th:block th:if="${seo.hreflangEnabled()}">
        <link rel="alternate" hreflang="ko" th:href="${seo.canonicalKo()}">
        <link rel="alternate" hreflang="en" th:href="${seo.canonicalEn()}">
        <link rel="alternate" hreflang="x-default" th:href="${seo.canonicalKo()}">
    </th:block>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" th:content="${seo.ogType()}">
    <meta property="og:site_name" content="DateDate">
    <meta property="og:title" th:content="${seo.ogTitle()}">
    <meta property="og:description" th:content="${seo.ogDescription()}">
    <meta property="og:url" th:content="${seo.canonical()}">
    <meta property="og:image" th:content="${seo.ogImage()}">
    <meta property="og:image:width" content="1490">
    <meta property="og:image:height" content="780">
    <meta property="og:image:type" content="image/png">
    <meta property="og:locale" th:content="${seo.ogLocale() != null} ? ${seo.ogLocale()} : (${#locale.language == 'en'} ? 'en_US' : 'ko_KR')">
    <!-- og:locale:alternate — 양방향 페이지(hreflangEnabled=true)일 때만 다른 언어 알림 -->
    <th:block th:if="${seo.hreflangEnabled()}">
        <meta property="og:locale:alternate" th:content="${#locale.language == 'en'} ? 'ko_KR' : 'en_US'">
    </th:block>

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${seo.ogTitle()}">
    <meta name="twitter:description" th:content="${seo.ogDescription()}">
    <meta name="twitter:image" th:content="${seo.ogImage()}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="alternate icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/apple-touch-icon.png}">

    <!-- PWA -->
    <link rel="manifest" th:href="@{/manifest.json}">
    <meta name="theme-color" content="#3498db">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DateDate">

    <!-- JSON-LD Structured Data -->
    <script th:if="${seo.jsonLd() != null}" type="application/ld+json" th:utext="${seo.jsonLd()}"></script>

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-PFPKQT7W');</script>
    <!-- End Google Tag Manager -->

    <!-- Google AdSense (only on content pages; gated by env-driven publisher ID) -->
    <script th:if="${seo.adsEnabled() and adsense.enabled}" async
            th:src="|https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${adsense.client}|"
            crossorigin="anonymous"></script>

    <!-- CSS (render-blocking, loaded first for no FOUC) -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Page-specific stylesheets (optional) -->
    <link th:if="${extraStylesheets != null}" th:each="css : ${extraStylesheets}"
          rel="stylesheet" th:href="@{${css}}">

    <!-- Web Fonts — async load with font-display:swap (CSS var fallbacks: Georgia, system-ui).
         - Pretendard: dynamic-subset variant uses unicode-range to chunk by script,
           so browsers only fetch the Korean/Latin slices actually used (~200-400 KiB total
           vs 2 MiB for the full variable font).
         - Noto Serif KR: only loaded for ko locale; en users get Georgia via --font-serif
           fallback chain in style.css. Saves ~228 KiB for non-Korean visitors. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
          as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
              rel="stylesheet">
    </noscript>
    <th:block th:if="${#locale.language == 'ko'}">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preload"
              href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap"
              as="style" onload="this.onload=null;this.rel='stylesheet'">
        <noscript>
            <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap"
                  rel="stylesheet">
        </noscript>
    </th:block>

    <!-- Deferred Scripts -->
    <script defer th:src="@{/js/locale-links.js}"></script>
    <script defer th:src="@{/js/navbar.js}"></script>
    <script defer th:src="@{/js/animations.js}"></script>
</head>

</html>
