<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>

<!--
  광고 슬롯 컴포넌트 (Google AdSense)
  CLS(Cumulative Layout Shift) 방지를 위해 min-height reserved space 포함.

  사용법:
    <div th:replace="~{fragments/ad-slot :: leaderboard(${seo.adsEnabled()})}"></div>
    <div th:replace="~{fragments/ad-slot :: infeed(${seo.adsEnabled()})}"></div>
    <div th:replace="~{fragments/ad-slot :: rectangle(${seo.adsEnabled()})}"></div>

  렌더 조건: adsEnabled=true 인 페이지(공개 콘텐츠) AND 해당 슬롯 ID 가 환경변수에 설정된 경우.
  핵심 task flow 페이지(일정 생성/참여)에서는 adsEnabled = false 유지.
  심사 통과 전에는 슬롯 ID 가 비어 있어 fragment 자체가 렌더되지 않으므로 placeholder DOM 노출 없음.

  client/slot ID 는 ControllerAdvice 가 주입하는 ${adsense.*} 모델 속성에서 읽는다.
-->

<!-- 리더보드 광고 (728x90 또는 반응형) - 섹션 상단/하단 배치 -->
<div th:fragment="leaderboard(adsEnabled)"
     th:if="${adsEnabled and adsense.hasLeaderboardSlot()}"
     class="ad-slot ad-slot-leaderboard"
     aria-label="광고"
     role="complementary">
    <ins class="adsbygoogle"
         style="display:block"
         th:attr="data-ad-client=${adsense.client},data-ad-slot=${adsense.slotLeaderboard}"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- 인피드 광고 (콘텐츠 사이) - 기사형 콘텐츠 페이지 중간 배치 -->
<div th:fragment="infeed(adsEnabled)"
     th:if="${adsEnabled and adsense.hasInfeedSlot()}"
     class="ad-slot ad-slot-infeed"
     aria-label="광고"
     role="complementary">
    <ins class="adsbygoogle"
         style="display:block; text-align:center;"
         data-ad-layout="in-article"
         data-ad-format="fluid"
         th:attr="data-ad-client=${adsense.client},data-ad-slot=${adsense.slotInfeed}"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- 직사각형 광고 (300x250) - 사이드바 또는 콘텐츠 하단 배치 -->
<div th:fragment="rectangle(adsEnabled)"
     th:if="${adsEnabled and adsense.hasRectangleSlot()}"
     class="ad-slot ad-slot-rectangle"
     aria-label="광고"
     role="complementary">
    <ins class="adsbygoogle"
         style="display:inline-block;width:300px;height:250px"
         th:attr="data-ad-client=${adsense.client},data-ad-slot=${adsense.slotRectangle}"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

</body>
</html>
