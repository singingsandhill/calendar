<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>

<!--
  광고 슬롯 컴포넌트 (Google AdSense)
  CLS(Cumulative Layout Shift) 방지를 위해 min-height reserved space 포함

  사용법:
    <div th:replace="~{fragments/ad-slot :: leaderboard(${seo.adsEnabled})}"></div>
    <div th:replace="~{fragments/ad-slot :: infeed(${seo.adsEnabled})}"></div>
    <div th:replace="~{fragments/ad-slot :: rectangle(${seo.adsEnabled})}"></div>

  adsEnabled = true 인 페이지(공개 콘텐츠 페이지)에서만 렌더링됨.
  핵심 task flow 페이지(일정 생성/참여)에서는 adsEnabled = false 유지.
-->

<!-- 리더보드 광고 (728x90 또는 반응형) - 섹션 상단/하단 배치 -->
<div th:fragment="leaderboard(adsEnabled)"
     th:if="${adsEnabled}"
     class="ad-slot ad-slot-leaderboard"
     aria-label="광고"
     role="complementary">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- 인피드 광고 (콘텐츠 사이) - 기사형 콘텐츠 페이지 중간 배치 -->
<div th:fragment="infeed(adsEnabled)"
     th:if="${adsEnabled}"
     class="ad-slot ad-slot-infeed"
     aria-label="광고"
     role="complementary">
    <ins class="adsbygoogle"
         style="display:block; text-align:center;"
         data-ad-layout="in-article"
         data-ad-format="fluid"
         data-ad-client="ca-pub-XXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- 직사각형 광고 (300x250) - 사이드바 또는 콘텐츠 하단 배치 -->
<div th:fragment="rectangle(adsEnabled)"
     th:if="${adsEnabled}"
     class="ad-slot ad-slot-rectangle"
     aria-label="광고"
     role="complementary">
    <ins class="adsbygoogle"
         style="display:inline-block;width:300px;height:250px"
         data-ad-client="ca-pub-XXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

</body>
</html>
