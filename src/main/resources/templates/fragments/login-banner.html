<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!--
  카카오 로그인 가치 제안 배너 — 비로그인 사용자에게만 노출 (sec:authorize).
  로그인 후 사용법 3단계(실제 순서라 번호 목록) 포함.
  사용법:
    <div th:replace="~{fragments/login-banner :: [th:fragment='login-banner']}"></div>
-->
<th:block th:fragment="login-banner">
    <section class="login-banner animate-on-scroll" sec:authorize="!hasRole('USER')">
        <div class="login-banner-text">
            <strong th:text="#{loginBanner.title}">내가 만든 일정, 잃어버리지 않게</strong>
            <p th:text="#{loginBanner.desc}">카카오로 연결하면 내 일정과 연간 리캡을 한곳에서 볼 수 있어요.</p>
            <ol class="login-banner-steps">
                <li th:text="#{loginBanner.step1}">카카오로 로그인</li>
                <li th:text="#{loginBanner.step2}">홈에서 ID를 입력해 일정 페이지 만들기 — 자동으로 내 계정에 연결돼요</li>
                <li th:text="#{loginBanner.step3}">마이페이지에서 내 페이지를 확인하고, 연말엔 연간 리캡 보기</li>
            </ol>
        </div>
        <a th:href="@{/oauth2/authorization/kakao}" class="btn-kakao">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path fill="#000000" fill-opacity="0.9"
                      d="M12 3C6.48 3 2 6.52 2 10.86c0 2.77 1.82 5.2 4.56 6.6l-.93 3.45c-.08.3.26.55.52.38l4.1-2.72c.57.08 1.15.12 1.75.12 5.52 0 10-3.52 10-7.83C22 6.52 17.52 3 12 3z"/>
            </svg>
            <span th:text="#{nav.login.kakao}">카카오 로그인</span>
        </a>
    </section>
</th:block>

</html>
