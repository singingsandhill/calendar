<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(${seo})}"></head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PFPKQT7W"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<div th:replace="~{fragments/header :: [th:fragment='header']}"></div>

<main class="container" id="main-content">
    <div class="dashboard-header">
        <h1 th:text="#{dashboard.title(${ownerId})}">Dashboard</h1>
        <!-- 일정이 하나라도 있을 때만 우상단 액션 노출. 빈 상태에선 본문 중앙 CTA 하나로 통일 -->
        <div th:if="${!schedules.isEmpty()}"
             style="display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;">
            <!-- 이번 달 일정 바로 열기 -->
            <a th:href="${@localeLinks.href('/' + ownerId + '/' + #dates.format(#dates.createNow(), 'yyyy') + '/' + #dates.format(#dates.createNow(), 'M'))}"
               class="btn btn-outline"
               th:text="#{dashboard.this.month}">이번 달</a>
            <button class="btn btn-primary" type="button" onclick="openCreateModal()" th:text="#{dashboard.new.schedule}">+ 일정 만들기</button>
        </div>
    </div>

    <!-- 카카오 계정 연결 (first-claim: 본인이 만든 페이지만 연결하도록 안내) -->
    <div class="owner-link-banner" th:if="${canLink}">
        <span th:text="#{owner.link.prompt}">이 페이지를 내 카카오 계정에 연결할 수 있어요. 본인이 만든 페이지만 연결하세요.</span>
        <button type="button" id="linkOwnerBtn" class="btn-link-owner"
                th:attr="data-owner-id=${ownerId}" th:text="#{owner.link.button}">내 계정에 연결</button>
    </div>
    <div class="owner-link-banner owner-link-done" th:if="${linkedToMe}">
        <span th:text="#{owner.link.done}">내 카카오 계정에 연결된 페이지예요.</span>
    </div>

    <section class="schedules-grid" th:if="${!schedules.isEmpty()}" th:attr="aria-label=#{dashboard.new.schedule}">
        <article class="schedule-card" th:each="schedule : ${schedules}">
            <header class="schedule-card-header">
                <h3 th:text="${schedule.formattedYearMonth()}">2025-12</h3>
            </header>
            <div class="schedule-card-body">
                <p th:text="#{dashboard.card.participants(${schedule.participantCount()})}">0명 참여</p>
            </div>
            <footer class="schedule-card-actions">
                <a th:href="${@localeLinks.href('/' + ownerId + '/' + schedule.year() + '/' + schedule.month())}"
                   class="btn btn-secondary" th:text="#{dashboard.card.view}">보기</a>
                <button class="btn btn-outline copy-link-btn"
                        th:data-owner="${ownerId}"
                        th:data-year="${schedule.year()}"
                        th:data-month="${schedule.month()}"
                        th:text="#{dashboard.card.copy}">
                    링크 복사
                </button>
                <button class="btn btn-danger delete-btn"
                        th:data-owner="${ownerId}"
                        th:data-year="${schedule.year()}"
                        th:data-month="${schedule.month()}"
                        th:text="#{dashboard.card.delete}">
                    삭제
                </button>
            </footer>
        </article>
    </section>

    <!-- 빈 상태 UI (일정 없을 때) -->
    <div class="empty-state" th:if="${schedules.isEmpty()}" role="status">
        <div class="empty-state-icon" aria-hidden="true">📅</div>
        <h2 th:text="#{dashboard.empty.title}">첫 일정을 만들어보세요</h2>
        <p th:text="#{dashboard.empty.desc}">링크 하나로 날짜·장소·메뉴를 함께 정하세요. 가입 없이 바로 시작할 수 있어요.</p>
        <button class="btn btn-primary" type="button" style="font-size: 1.05rem; padding: 0.875rem 2rem;"
                onclick="openCreateModal()" th:text="#{dashboard.new.schedule}">+ 일정 만들기</button>
        <p style="margin-top: 1.25rem; font-size: 0.9rem;">
            <a th:href="${@localeLinks.href('/guide')}" th:text="#{dashboard.empty.guide}">사용 가이드 보기 →</a>
        </p>
    </div>
</main>

<!-- Create Schedule Modal -->
<div th:replace="~{fragments/create-schedule-modal :: modal}"></div>

<div th:replace="~{fragments/footer :: [th:fragment='footer']}"></div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

<!-- Owner data injection for external script -->
<script th:inline="javascript">
    window.OWNER_DATA = { ownerId: [[${ownerId}]] };
</script>
<script defer th:src="@{/js/analytics.js}"></script>
<script defer th:src="@{/js/create-schedule-modal.js}"></script>
<script defer th:src="@{/js/owner-dashboard.js}"></script>
<script th:inline="javascript">
    (function () {
        var ownerId = /*[[${ownerId}]]*/ '';
        var scheduleCount = /*[[${schedules.size()}]]*/ 0;
        var fire = function () {
            if (!window.DDAnalytics || !window.DDAnalytics.sha256Hex) return;
            window.DDAnalytics.sha256Hex(ownerId).then(function (hash) {
                if (!hash) return; // PII 누출 방지: 해시 실패 시 push 안 함
                window.dataLayer = window.dataLayer || [];
                window.dataLayer.push({
                    event: 'owner_dashboard_viewed',
                    owner_id_hash: hash,
                    schedule_count: scheduleCount
                });
            });
        };
        if (document.readyState === 'loading') {
            window.addEventListener('load', fire);
        } else {
            fire();
        }
    })();
</script>
<script>
    (function () {
        var btn = document.getElementById('linkOwnerBtn');
        if (!btn) return;
        btn.addEventListener('click', function () {
            fetch('/api/me/owners/' + btn.dataset.ownerId, { method: 'POST' })
                .then(function (res) {
                    if (res.redirected) { location.href = res.url; return; }
                    if (res.ok) { location.reload(); return; }
                    return res.json().then(function (body) { alert(body.message); });
                })
                .catch(function () {
                    alert('연결에 실패했어요. 잠시 후 다시 시도해 주세요.');
                });
        });
    })();
</script>
</body>
</html>
