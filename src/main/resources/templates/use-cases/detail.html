<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(${seo})}"></head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PFPKQT7W"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div th:replace="~{fragments/header :: [th:fragment='header-minimal']}"></div>

<main class="container use-case-page">
    <section class="use-case-hero animate-on-scroll">
        <h1 th:text="#{'seo.useCase.' + ${currentSlug} + '.title'}">Use Case</h1>
        <p class="use-case-subtitle" th:text="#{'seo.useCase.' + ${currentSlug} + '.description'}">Description</p>
    </section>

    <section class="use-case-content animate-on-scroll">
        <div class="use-case-body" th:text="#{'seo.useCase.' + ${currentSlug} + '.body'}">
            Body
        </div>

        <div class="use-case-example">
            <h3 th:text="#{usecase.example}">Example</h3>
            <div class="use-case-example-url">
                <span class="use-case-example-label" th:text="#{'seo.useCase.' + ${currentSlug} + '.exampleLabel'}">Example</span>
                <code>datedate.site/<span th:text="#{'seo.useCase.' + ${currentSlug} + '.exampleId'}">example</span></code>
            </div>
        </div>
    </section>

    <!-- 광고 슬롯: 콘텐츠 소비 후, CTA 직전 -->
    <div th:replace="~{fragments/ad-slot :: infeed(${seo.adsEnabled()})}"></div>

    <section class="use-case-cta animate-on-scroll">
        <h2 th:text="#{usecase.cta.title}">Get started right now</h2>
        <p th:text="#{usecase.cta.description}">No sign-up, no installation, no cost.</p>
        <div class="use-case-cta-buttons">
            <a href="/#start-form" class="btn-spring" th:text="#{usecase.cta.start}">Create Schedule</a>
            <a th:href="@{/guide}" class="btn-text" th:text="#{usecase.cta.guide}">View User Guide →</a>
        </div>
    </section>

    <section class="use-case-others animate-on-scroll">
        <h2 th:text="#{usecase.others.title}">Other Use Cases</h2>
        <div class="use-case-grid">
            <th:block th:each="slug : ${allSlugs}">
                <a th:if="${slug != currentSlug}"
                   th:href="@{'/use-cases/' + ${slug}}"
                   class="use-case-card">
                    <h3 th:text="#{'seo.useCase.' + ${slug} + '.title'}">Title</h3>
                    <p th:text="#{'seo.useCase.' + ${slug} + '.description'}">Description</p>
                </a>
            </th:block>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: [th:fragment='footer-minimal']}"></div>
</body>
</html>
