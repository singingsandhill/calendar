<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head th:replace="~{fragments/head :: head(${seo})}"></head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PFPKQT7W"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div th:replace="~{fragments/header :: [th:fragment='header-minimal']}"></div>

<main class="container use-case-page">
    <section class="use-case-hero animate-on-scroll">
        <h1 th:text="${useCase.title()}">활용 사례</h1>
        <p class="use-case-subtitle" th:text="${useCase.seoDescription()}">설명</p>
    </section>

    <section class="use-case-content animate-on-scroll">
        <div class="use-case-body" th:text="${useCase.content()}">
            본문 내용
        </div>

        <div class="use-case-example">
            <h3 th:text="#{usecase.example}">사용 예시</h3>
            <div class="use-case-example-url">
                <span class="use-case-example-label" th:text="${useCase.exampleLabel()}">예시</span>
                <code>datedate.site/<span th:text="${useCase.exampleId()}">example</span></code>
            </div>
        </div>
    </section>

    <!-- 광고 슬롯: 콘텐츠 소비 후, CTA 직전 -->
    <div th:replace="~{fragments/ad-slot :: infeed(${seo.adsEnabled()})}"></div>

    <section class="use-case-cta animate-on-scroll">
        <h2 th:text="#{usecase.cta.title}">지금 바로 시작하세요</h2>
        <p th:text="#{usecase.cta.description}">가입도, 설치도, 비용도 없습니다.</p>
        <div class="use-case-cta-buttons">
            <a href="/#start-form" class="btn-spring" th:text="#{usecase.cta.start}">일정 만들기</a>
            <a th:href="@{/guide}" class="btn-text" th:text="#{usecase.cta.guide}">사용 가이드 보기 →</a>
        </div>
    </section>

    <section class="use-case-others animate-on-scroll">
        <h2 th:text="#{usecase.others.title}">다른 활용 사례</h2>
        <div class="use-case-grid">
            <th:block th:each="entry : ${allUseCases}">
                <a th:if="${entry.key != currentSlug}"
                   th:href="@{'/use-cases/' + ${entry.key}}"
                   class="use-case-card">
                    <h3 th:text="${entry.value.title()}">제목</h3>
                    <p th:text="${entry.value.seoDescription()}">설명</p>
                </a>
            </th:block>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: [th:fragment='footer-minimal']}"></div>
</body>
</html>
