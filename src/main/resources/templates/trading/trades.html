<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{trading/fragments/header :: header}"></head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen">

<nav th:replace="~{trading/fragments/header :: navbar}"></nav>

<main class="container mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold mb-6 dark:text-white">Trade History</h1>

    <!-- Profit Summary -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
        <div class="card">
            <div class="stat-label">Realized P&amp;L</div>
            <div class="stat-value" id="realized-pnl">…</div>
        </div>
        <div class="card">
            <div class="stat-label">Total Trades</div>
            <div class="stat-value" id="total-trades">-</div>
        </div>
        <div class="card">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="win-rate">-</div>
        </div>
        <div class="card">
            <div class="stat-label">Avg P&amp;L</div>
            <div class="stat-value" id="avg-pnl">-</div>
        </div>
        <div class="card">
            <div class="stat-label">Total Fees</div>
            <div class="stat-value text-base" id="total-fees">-</div>
        </div>
    </div>

    <!-- Daily P&L Chart -->
    <div class="card mb-6">
        <h2 class="text-lg font-semibold mb-4 dark:text-white">Daily P&amp;L (30d)</h2>
        <div id="daily-chart" style="height: 200px;"></div>
    </div>

    <!-- Trades Table -->
    <div class="card">
        <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h2 class="text-lg font-semibold dark:text-white">Recent Trades</h2>
            <div class="flex items-center gap-2 text-xs">
                <span class="text-gray-500">갱신: <span id="trades-updated">-</span></span>
                <button id="trades-refresh-btn" type="button" class="btn-secondary text-xs">Refresh</button>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-3" id="trades-filter-chips" role="tablist" aria-label="Trade status filter">
            <button type="button" data-filter="ALL" class="badge badge-notice" aria-selected="true">전체</button>
            <button type="button" data-filter="DONE" class="badge badge-neutral" aria-selected="false">체결</button>
            <button type="button" data-filter="WAIT" class="badge badge-neutral" aria-selected="false">대기</button>
            <button type="button" data-filter="FAILED_OR_CANCEL" class="badge badge-neutral" aria-selected="false">실패·취소</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="text-gray-500 border-b border-gray-300 dark:border-gray-700">
                    <tr>
                        <th class="text-left py-3 px-2">Time</th>
                        <th class="text-left py-3 px-2">Type</th>
                        <th class="text-right py-3 px-2">Price</th>
                        <th class="text-right py-3 px-2">Volume</th>
                        <th class="text-right py-3 px-2">Amount</th>
                        <th class="text-left py-3 px-2">Status</th>
                    </tr>
                </thead>
                <tbody id="trades-table" class="dark:text-gray-300">
                    <tr><td colspan="6" class="text-center py-8">Loading…</td></tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-center mt-4 space-x-2 items-center text-sm">
            <button id="prev-btn" type="button" class="btn-secondary" disabled>Previous</button>
            <span class="px-4 py-2 text-gray-500 dark:text-gray-400" id="page-info">Page 1</span>
            <button id="next-btn" type="button" class="btn-secondary">Next</button>
        </div>
    </div>

    <!-- Positions Table -->
    <div class="card mt-6">
        <h2 class="text-lg font-semibold mb-4 dark:text-white">Position History</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="text-gray-500 border-b border-gray-300 dark:border-gray-700">
                    <tr>
                        <th class="text-left py-3 px-2">Opened</th>
                        <th class="text-left py-3 px-2">Closed</th>
                        <th class="text-right py-3 px-2">Entry</th>
                        <th class="text-right py-3 px-2">Exit</th>
                        <th class="text-right py-3 px-2">P&amp;L</th>
                        <th class="text-left py-3 px-2">Reason</th>
                    </tr>
                </thead>
                <tbody id="positions-table" class="dark:text-gray-300">
                    <tr><td colspan="6" class="text-center py-8">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script defer th:src="@{/js/trading-globals.js}"></script>
<script defer th:src="@{/js/trading-trades.js}"></script>

</body>
</html>
