<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{trading/fragments/header :: header}"></head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen">

<nav th:replace="~{trading/fragments/header :: navbar}"></nav>

<main class="container mx-auto px-4 py-6">

    <!-- Row 1: 운영 요약 카드 6개 -->
    <div class="grid grid-cols-2 lg:grid-cols-6 gap-3 mb-6">
        <div class="card">
            <div class="stat-label">Total Value</div>
            <div class="stat-value" id="card-total-value">…</div>
            <div class="text-xs text-gray-500 mt-1" id="card-total-sub"></div>
        </div>
        <div class="card">
            <div class="stat-label">Today P&L</div>
            <div class="stat-value" id="card-today-pnl">…</div>
            <div class="text-xs text-gray-500 mt-1" id="card-today-sub"></div>
        </div>
        <div class="card">
            <div class="stat-label">Unrealized P&L</div>
            <div class="stat-value" id="card-unrealized">…</div>
            <div class="text-xs text-gray-500 mt-1" id="card-unrealized-sub"></div>
        </div>
        <div class="card">
            <div class="stat-label">Cash / Coin</div>
            <div class="stat-value text-base" id="card-allocation">…</div>
            <div class="mt-2"><div class="gauge"><div id="card-allocation-gauge" class="gauge-fill" style="width:0%"></div></div></div>
            <div class="text-xs mt-1" id="card-allocation-sub"></div>
        </div>
        <div class="card">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="card-winrate">…</div>
            <div class="text-xs text-gray-500 mt-1" id="card-winrate-sub"></div>
        </div>
        <div class="card" id="card-bot">
            <div class="stat-label">Bot</div>
            <div class="stat-value text-base flex items-center gap-2">
                <span id="card-bot-dot" class="status-dot status-dot-unknown"></span>
                <span id="card-bot-text">…</span>
            </div>
            <div class="text-xs text-gray-500 mt-1" id="card-bot-sub"></div>
            <div class="mt-3 flex space-x-2">
                <button id="btn-toggle-bot" type="button" class="btn-primary text-xs">Start</button>
                <button id="btn-emergency" type="button" class="btn-danger text-xs">Emergency</button>
            </div>
        </div>
    </div>

    <!-- Row 2: Active Positions -->
    <section class="card mb-6">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-lg font-semibold dark:text-white">Active Positions</h2>
            <span id="active-positions-meta" class="text-xs text-gray-500"></span>
        </div>
        <div id="active-positions" class="space-y-3">
            <div class="text-sm text-gray-500">Loading…</div>
        </div>
    </section>

    <!-- Row 3: Chart + Signal -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
        <div class="card lg:col-span-2">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold dark:text-white">Price - <span th:text="${market}">KRW-ADA</span></h2>
                <span class="text-xl font-bold dark:text-white" id="current-price">…</span>
            </div>
            <div id="chart-container" style="height: 360px;"></div>
        </div>
        <div class="card">
            <h3 class="text-lg font-semibold mb-3 dark:text-white">Signal</h3>
            <div class="grid grid-cols-2 gap-3 text-sm">
                <div>
                    <div class="stat-label">RSI (14)</div>
                    <div class="font-medium" id="indicator-rsi">-</div>
                </div>
                <div>
                    <div class="stat-label">Stoch K/D</div>
                    <div class="font-medium" id="indicator-stoch">-</div>
                </div>
                <div>
                    <div class="stat-label">MA5</div>
                    <div class="font-medium" id="indicator-ma5">-</div>
                </div>
                <div>
                    <div class="stat-label">MA20</div>
                    <div class="font-medium" id="indicator-ma20">-</div>
                </div>
                <div>
                    <div class="stat-label">MA60</div>
                    <div class="font-medium" id="indicator-ma60">-</div>
                </div>
                <div>
                    <div class="stat-label">현재가 vs MA60</div>
                    <div class="font-medium" id="indicator-regime">-</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Row 4: Recent Events -->
    <section class="card mb-6">
        <div class="flex items-center justify-between mb-3">
            <h3 class="text-lg font-semibold dark:text-white">Recent Events</h3>
            <div class="flex items-center gap-2 text-xs">
                <label for="events-min-level" class="text-gray-500">최소 등급</label>
                <select id="events-min-level" class="text-xs border border-gray-300 dark:border-gray-600 rounded px-1 py-0.5 dark:bg-gray-800 dark:text-white">
                    <option value="">전체</option>
                    <option value="NOTICE" selected>NOTICE+</option>
                    <option value="WARNING">WARNING+</option>
                    <option value="CRITICAL">CRITICAL</option>
                </select>
                <span class="text-gray-500">갱신: <span id="events-updated">-</span></span>
            </div>
        </div>
        <div id="events-list" class="text-sm space-y-1 dark:text-gray-300">
            <div class="text-gray-500">Loading…</div>
        </div>
    </section>

    <!-- Row 5: Recent Closed Positions -->
    <section class="card">
        <h3 class="text-lg font-semibold mb-3 dark:text-white">Recent Closed Positions</h3>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="text-gray-500">
                <tr>
                    <th scope="col" class="text-left py-2">Closed</th>
                    <th scope="col" class="text-right py-2">Entry</th>
                    <th scope="col" class="text-right py-2">Exit</th>
                    <th scope="col" class="text-right py-2">P&L %</th>
                    <th scope="col" class="text-left py-2 pl-2">Reason</th>
                </tr>
                </thead>
                <tbody id="positions-table" class="dark:text-gray-300">
                <tr><td colspan="5" class="text-center py-4 text-gray-500">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script defer th:src="@{/js/trading-confirm.js}"></script>
<script defer th:src="@{/js/trading-globals.js}"></script>
<script defer th:src="@{/js/trading-dashboard.js}"></script>

</body>
</html>
