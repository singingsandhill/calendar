<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="#3498db"/>
  <!-- Center card -->
  <rect x="160" y="120" width="880" height="390" rx="24" fill="white"
        style="filter:drop-shadow(0 8px 32px rgba(0,0,0,0.10))"/>
  <!-- Logo text -->
  <text x="600" y="265" font-family="Georgia, serif" font-size="88" font-weight="600"
        fill="#3498db" text-anchor="middle">DateDate</text>
  <!-- Tagline -->
  <text x="600" y="340" font-family="-apple-system, sans-serif" font-size="32"
        fill="#555" text-anchor="middle">여러명이서 쉽게 날짜 조율하기</text>
  <!-- Sub-tagline -->
  <text x="600" y="392" font-family="-apple-system, sans-serif" font-size="22"
        fill="#888" text-anchor="middle">링크 하나로 날짜 · 장소 · 메뉴까지 한번에</text>
  <!-- URL -->
  <text x="600" y="570" font-family="-apple-system, sans-serif" font-size="24"
        fill="#aaa" text-anchor="middle">datedate.site</text>
</svg>
